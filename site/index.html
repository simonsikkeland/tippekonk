<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Piggy's tippekonkurranse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B132B; --paper:#FBF7F0; --line:#E3DACB; --pitch:#1E6F3C;
    --gold:#E8B83A; --gold-deep:#C9971F; --red:#C8472F; --slate:#5A6472; --chalk:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif}
  .display{font-family:'Archivo',sans-serif}
  header{background:var(--pitch);color:var(--chalk);padding:30px 20px 26px;border-bottom:4px solid var(--gold);position:relative;overflow:hidden}
  header .stripes{position:absolute;inset:0;opacity:.10;background:repeating-linear-gradient(90deg,transparent 0 56px,#fff 56px 57px)}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  .eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:800}
  h1{margin:6px 0 0;font-size:clamp(30px,7vw,46px);font-weight:900;line-height:1;letter-spacing:-1px}
  .sub{margin:8px 0 0;color:#D8E8DC;font-size:15px}
  main{max-width:1000px;margin:0 auto;padding:22px 20px 60px}
  select{font:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .meta{display:flex;gap:26px;flex-wrap:wrap;padding:14px 18px;background:#fff;border:1px solid var(--line);border-radius:12px;margin:18px 0}
  .meta .k{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);font-weight:800}
  .meta .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}

  /* Top area: scorers sidebar */
  .top-area{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-top:18px}
  @media(max-width:700px){.top-area{grid-template-columns:1fr}}
  .scorers-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;height:fit-content}
  .scorers-box h3{margin:0 0 10px;font-family:'Archivo';font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--slate)}
  .scorer-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .scorer-row img{width:20px;height:14px;object-fit:contain;border-radius:1px}
  .scorer-row:last-child{border-bottom:none}
  .scorer-row .rk{font-family:'Archivo';font-weight:900;color:var(--slate);min-width:20px}
  .scorer-row.lead .rk{color:var(--gold-deep)}
  .scorer-row .goals{font-family:'Archivo';font-weight:900;color:var(--pitch);margin-left:auto;font-size:16px}
  .scorer-row .team-name{color:var(--slate);font-size:12px}

  /* Matches */
  .match-day{margin-bottom:16px}
  .match-day h3{font-family:'Archivo';font-size:14px;color:var(--slate);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}
  .match-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:5px;gap:8px}
  .match-card .team{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .match-card .team.right{justify-content:flex-end;text-align:right}
  .match-card .team img{width:20px;height:14px;object-fit:contain;border-radius:1px}
  .match-card .score{font-family:'Archivo';font-weight:900;font-size:18px;color:var(--pitch);min-width:56px;text-align:center}
  .match-card .score.pending{color:var(--slate);font-size:13px;font-weight:600}
  .match-card .score.live{color:var(--red)}
  .match-card .grp-tag{font-size:10px;color:var(--slate)}
  .old-toggle{background:none;border:1px solid var(--line);border-radius:8px;padding:8px 16px;font:inherit;font-size:13px;font-weight:700;color:var(--slate);cursor:pointer;margin-bottom:14px;transition:all .15s}
  .old-toggle:hover{border-color:var(--gold);color:var(--ink)}

  /* Groups */
  .grp-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .grp-btn{font:inherit;font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;border:2px solid var(--line);background:#fff;cursor:pointer;transition:all .15s}
  .grp-btn:hover{border-color:var(--gold)}
  .grp-btn.active{background:var(--pitch);color:#fff;border-color:var(--pitch)}
  .grp-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:8px}
  .grp-table th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);border-bottom:2px solid var(--line)}
  .grp-table th.num{text-align:center}
  .grp-table td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:15px}
  .grp-table td.num{text-align:center;font-family:'Archivo';font-weight:800;font-variant-numeric:tabular-nums}
  .grp-table tr:last-child td{border-bottom:none}
  .grp-table tr:nth-child(-n+2) td.num{color:var(--pitch)}
  .grp-table .team-cell{display:flex;align-items:center;gap:8px}
  .grp-table .team-cell img{width:22px;height:15px;object-fit:contain;border-radius:1px}

  /* Podium */
  .podium{display:flex;gap:12px;margin-bottom:18px}
  .podium-card{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 14px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
  .podium-card.gold{border-color:var(--gold);background:linear-gradient(180deg,#FFF9EB,#fff)}
  .podium-card.silver{border-color:#C0C0C0;background:linear-gradient(180deg,#F5F5F5,#fff)}
  .podium-card.bronze{border-color:#CD7F32;background:linear-gradient(180deg,#FFF5EB,#fff)}
  .podium-medal{font-size:28px}
  .podium-name{font-weight:800;font-size:18px;font-family:'Archivo'}
  .podium-pts{font-family:'Archivo';font-size:22px;font-weight:900;color:var(--pitch)}

  /* Board */
  .board{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .hrow,.row{display:grid;grid-template-columns:56px 1fr 96px 36px;align-items:center}
  .hrow{padding:11px 16px;border-bottom:2px solid var(--line);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);font-weight:800}
  .row{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .row:hover{background:#F3ECE0}
  .pos{font-family:'Archivo';font-size:21px;font-weight:900}
  .pos.lead{color:var(--gold-deep)}
  .nm{font-weight:700;font-size:16px}
  .pts{font-family:'Archivo';text-align:right;font-size:23px;font-weight:900;color:var(--pitch);font-variant-numeric:tabular-nums}
  .chev{text-align:right;color:var(--slate)}
  .detail{padding:6px 16px 16px;background:#FAF5EC;border-bottom:1px solid var(--line);display:none}
  .detail.open{display:block}
  .dl{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px dashed var(--line)}
  .dl:last-child{border-bottom:none}
  .dl .p{font-weight:800;font-variant-numeric:tabular-nums}
  .dl .p.zero{color:var(--slate)}
  .dl .p.win{color:var(--pitch)}
  h2{font-family:'Archivo';font-size:20px;margin:30px 0 12px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h3{margin:0 0 4px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--slate)}
  .card .big{font-family:'Archivo';font-size:30px;font-weight:900}
  .card .muted{margin:6px 0;color:var(--slate);font-size:13px}
  .ladder{margin-top:8px;font-size:14px}
  .ladder div{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}
  .pod{background:var(--pitch);color:#fff;border-radius:12px;padding:18px;margin-top:14px}
  .pod h3{margin:0 0 8px;font-family:'Archivo'}
  audio{width:100%;margin-top:6px}
  .manus-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 14px;font:inherit;font-size:13px;font-weight:700;color:#D8E8DC;cursor:pointer;margin-top:10px;transition:all .15s}
  .manus-toggle:hover{background:rgba(255,255,255,.25)}
  .manus-box{margin-top:12px;padding:14px;background:rgba(0,0,0,.2);border-radius:10px;display:none}
  .manus-box.open{display:block}
  .replikk{margin-bottom:10px;font-size:14px;line-height:1.5;color:#D8E8DC}
  .replikk:last-child{margin-bottom:0}
  .replikk .vert-navn{font-weight:800;color:var(--gold);margin-right:6px}
  .playlist{margin-top:14px;border-top:1px solid rgba(255,255,255,.15);padding-top:10px}
  .playlist h4{margin:0 0 8px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:800}
  .pl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s;font-size:14px;color:#D8E8DC}
  .pl-item:hover{background:rgba(255,255,255,.1)}
  .pl-item.active{background:rgba(255,255,255,.15);font-weight:700}
  .pl-item .pl-date{color:rgba(255,255,255,.5);font-size:12px;min-width:50px}
  .pl-item .pl-play{color:var(--gold);font-size:16px}
  /* Tippefordeling (hvem tippet hva) */
  .fchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .fchip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--slate)}
  .fchip b{color:var(--ink);font-weight:800}
  .fday{margin-bottom:18px}
  .fday h3{font-family:'Archivo';font-size:14px;color:var(--slate);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}
  .fmatch{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:6px}
  .fmatch .fhead{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;margin-bottom:8px}
  .fmatch .fhead img{width:18px;height:12px;object-fit:contain;border-radius:1px}
  .fmatch .fhead .vs{color:var(--slate);font-weight:600;margin:0 2px}
  .fmatch .fhead .grp{margin-left:auto;font-size:10px;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .fbar{display:flex;height:26px;border-radius:6px;overflow:hidden;background:#F3ECE0}
  .fseg{display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#fff;min-width:0;transition:width .3s;position:relative}
  .fseg.h{background:#3F6CB5}
  .fseg.u{background:#E08A2B}
  .fseg.b{background:#7C8696}
  .fseg.win{box-shadow:inset 0 0 0 3px var(--gold)}
  .fseg span{padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .flegend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--slate);margin:2px 0 14px}
  .flegend b{font-weight:800}
  .flegend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .fcheck{font-size:11px;color:var(--slate);margin-top:5px}
  .fcheck.hit{color:var(--pitch);font-weight:700}
  .fcheck.miss{color:var(--red);font-weight:700}
  .fpicks{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:7px;font-size:12px;color:var(--slate)}
  .ftip b{display:inline-block;min-width:15px;text-align:center;font-family:'Archivo';font-weight:900;color:var(--ink);margin-right:3px}
  .empty{text-align:center;padding:54px 20px;background:#fff;border:1px dashed var(--line);border-radius:12px;color:var(--slate)}
  .empty .big{font-family:'Archivo';font-size:20px;font-weight:800;color:var(--ink)}
  footer{max-width:1000px;margin:0 auto;padding:10px 20px 40px;color:var(--slate);font-size:12px}
  .pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--gold);color:#3a2c00}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="stripes"></div>
  <div class="wrap" style="position:relative">
    <div class="eyebrow">Piggy's · tippekonkurranse</div>
    <h1 id="title">Stillingen</h1>
    <p class="sub" id="subtitle">Laster …</p>
  </div>
</header>
<main>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <label for="tsel" style="font-size:13px;color:var(--slate);font-weight:700">Mesterskap:</label>
    <select id="tsel"></select>
    <span id="updated" style="font-size:12px;color:var(--slate)"></span>
  </div>

  <div class="meta" id="meta"></div>

  <!-- 1. Pall (topp 3) + toppscorere -->
  <div class="top-area">
    <div id="board"></div>
    <div id="scorers"></div>
  </div>

  <!-- 2. Podcast -->
  <div id="podcast"></div>

  <!-- 3. Dagens kamper + tippefordeling -->
  <div id="kamper"></div>
  <div id="fordeling"></div>

  <!-- 4. Grupper + øvrig statistikk -->
  <div id="grupper"></div>
  <div id="stats"></div>
</main>
<footer id="foot"></footer>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let _flagg = {};
function flag(team){ const u=_flagg[team]; return u?`<img src="${esc(u)}" alt="${esc(team)}">`:''; }

async function jget(u){ const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(u); return r.json(); }

async function init(){
  let manifest=[];
  try{ manifest = await jget("manifest.json"); }catch(e){}
  const sel = $("#tsel");
  if(!manifest.length){ $("#subtitle").textContent="Ingen mesterskap publisert ennå."; return; }
  manifest.forEach(m=>{
    const o=document.createElement("option"); o.value=m.id; o.textContent=m.kort_navn; sel.appendChild(o);
  });
  sel.onchange=()=>load(sel.value);
  load(manifest[manifest.length-1].id);
}

async function load(id){
  let d;
  try{ d = await jget(`${id}/stilling.json`); }
  catch(e){ $("#board").innerHTML=`<div class="empty"><div class="big">Ingen data ennå</div><p>Last opp ark for dette mesterskapet.</p></div>`; return; }

  _flagg = (d.fasit||{}).flagg||{};

  $("#title").textContent = d.turnering.kort_navn || "Stillingen";
  $("#subtitle").textContent = d.turnering.navn + (d.turnering.vert?` · ${d.turnering.vert}`:"");
  $("#updated").textContent = d.oppdatert ? "Oppdatert "+new Date(d.oppdatert).toLocaleString("no-NO") : "";

  const gruppeFerdig = (d.fasit||{}).gruppespill_ferdig;
  const statusText = gruppeFerdig ? '<span class="pill">I gang</span>' : d.har_fasit ? '<span class="pill" style="background:#5a9;color:#042">Gruppespill</span>' : 'Ikke startet';
  $("#meta").innerHTML = `
    <div><div class="k">Deltakere</div><div class="v">${d.stilling.length}</div></div>
    <div><div class="k">Status</div><div class="v">${statusText}</div></div>`;

  // Pall (topp 3)
  let bHtml = '<h2 style="margin-top:0">Stilling</h2>';
  if(d.har_fasit && d.stilling.length >= 3){
    const medals = ['🥇','🥈','🥉'];
    bHtml += '<div class="podium">' + d.stilling.slice(0,3).map((s,i)=>`
      <div class="podium-card ${i===0?'gold':i===1?'silver':'bronze'}">
        <span class="podium-medal">${medals[i]}</span>
        <span class="podium-name">${esc(s.navn)}</span>
        <span class="podium-pts">${s.poeng}p</span>
      </div>`).join('') + '</div>';
  }

  // Full tabell (skjult bak knapp)
  let rows = `<div class="board"><div class="hrow"><span>Plass</span><span>Deltaker</span><span style="text-align:right">Poeng</span><span></span></div>`;
  d.stilling.forEach((s,i)=>{
    rows += `<div class="row board-row" data-idx="${i}" onclick="toggle(${i})">
      <span class="pos ${i===0&&d.har_fasit?'lead':''}">${d.har_fasit?s.plass:'–'}</span>
      <span class="nm">${esc(s.navn)}</span>
      <span class="pts" style="${d.har_fasit?'':'color:var(--slate)'}">${d.har_fasit?s.poeng:'—'}</span>
      <span class="chev">${d.har_fasit?'▸':''}</span></div>
      <div class="detail" id="det${i}">${(s.linjer||[]).map(l=>`
        <div class="dl"><span>${esc(l.label)} <span style="color:var(--slate);font-size:12px">· ${esc(l.detail)}</span></span>
        <span class="p ${l.pts>0?'win':'zero'}">${l.pts}p</span></div>`).join("")}</div>`;
  });
  rows += `</div>`;
  if(d.har_fasit){
    bHtml += `<button class="old-toggle" onclick="toggleF(this,'full-board')">Vis hele tabellen (${d.stilling.length}) ▾</button>
      <div id="full-board" style="display:none">${rows}</div>`;
  } else {
    bHtml += rows;
  }
  $("#board").innerHTML = bHtml;

  renderKamper(d);
  renderGrupper(d);
  renderScorers(d);
  renderStats(d);
  renderFordeling(d);
  renderPodcast(id, d);
  $("#foot").textContent = "Drevet av GitHub Pages. Resultater fra football-data.org. Alt bygges automatisk.";
}

function toggle(i){ $("#det"+i)?.classList.toggle("open"); }

function renderKamper(d){
  const kamper = (d.fasit||{}).kamper||[];
  if(!kamper.length){ $("#kamper").innerHTML=''; return; }

  const today = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);

  // All matches from first day to tomorrow
  const relevant = kamper.filter(k=> k.dato <= tomorrow);
  if(!relevant.length){ $("#kamper").innerHTML=''; return; }

  const byDate = {};
  relevant.forEach(k=>{ (byDate[k.dato]=byDate[k.dato]||[]).push(k); });
  const dates = Object.keys(byDate).sort().reverse(); // newest first

  const dateLabel = dato => {
    if(dato===today) return 'I dag';
    if(dato===tomorrow) return 'I morgen';
    const d = new Date(dato+'T12:00:00');
    const days=['Søn','Man','Tirs','Ons','Tors','Fre','Lør'];
    return `${days[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}`;
  };

  // I dag først, så i morgen; eldre dager kollapses
  const recentDates = dates.filter(d=> d>=today).sort();
  const olderDates = dates.filter(d=> d<today);

  let html = '<h2>Dagens kamper</h2>';

  // Today + tomorrow
  recentDates.forEach(dato=>{
    html += renderMatchDay(dato, byDate[dato], dateLabel);
  });

  // Older matches collapsed
  if(olderDates.length){
    html += `<button class="old-toggle" onclick="toggleOld(this)">Vis tidligere kamper (${olderDates.length} dager)</button>`;
    html += '<div id="old-matches" style="display:none">';
    olderDates.forEach(dato=>{
      html += renderMatchDay(dato, byDate[dato], dateLabel);
    });
    html += '</div>';
  }

  $("#kamper").innerHTML = html;
}

function renderMatchDay(dato, matches, dateLabel){
  let html = `<div class="match-day"><h3>${dateLabel(dato)}</h3>`;
  matches.forEach(k=>{
    const finished = k.status==='FINISHED';
    const live = k.status==='IN_PLAY'||k.status==='PAUSED';
    const scoreText = finished ? `${k.home_score} – ${k.away_score}`
      : live ? `${k.home_score??0} – ${k.away_score??0}` : 'vs';
    const cls = live ? 'score live' : finished ? 'score' : 'score pending';
    const grp = k.group?`<span class="grp-tag">${esc(k.group.replace('GROUP_','Gr. '))}</span>`:'';
    html += `<div class="match-card">
      <div class="team right">${grp} ${flag(k.home)} ${esc(k.home)}</div>
      <div class="${cls}">${live?'LIVE ':''} ${scoreText}</div>
      <div class="team">${esc(k.away)} ${flag(k.away)}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function toggleOld(btn){
  const el=document.getElementById('old-matches');
  if(el.style.display==='none'){ el.style.display=''; btn.textContent='Skjul tidligere kamper'; }
  else{ el.style.display='none'; btn.textContent=btn.textContent.replace('Skjul','Vis'); }
}

function renderGrupper(d){
  const grupper = (d.fasit||{}).grupper||{};
  const keys = Object.keys(grupper).sort();
  if(!keys.length){ $("#grupper").innerHTML=''; return; }

  let html = '<h2>Grupper</h2><div class="grp-btns">';
  keys.forEach((g,i)=>{
    html += `<button class="grp-btn${i===0?' active':''}" onclick="showGroup('${g}',this)">${esc(g)}</button>`;
  });
  html += '</div>';

  keys.forEach((g,i)=>{
    const rows = grupper[g];
    html += `<div class="grp-content" id="grp-${g.replace(/ /g,'_')}" style="${i===0?'':'display:none'}">
      <table class="grp-table"><thead><tr>
        <th>#</th><th>Lag</th><th class="num">K</th><th class="num">P</th><th class="num">MF</th><th class="num">M+</th>
      </tr></thead><tbody>`;
    rows.forEach((r,j)=>{
      html += `<tr>
        <td class="num">${j+1}</td>
        <td><div class="team-cell">${flag(r.lag)} ${esc(r.lag)}</div></td>
        <td class="num">${r.spilt||0}</td>
        <td class="num">${r.poeng}</td>
        <td class="num">${r.mf>=0?'+':''}${r.mf}</td>
        <td class="num">${r.maal_for}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });
  $("#grupper").innerHTML = html;
}

function showGroup(g, btn){
  document.querySelectorAll('.grp-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.grp-content').forEach(el=>el.style.display='none');
  const el = document.getElementById('grp-'+g.replace(/ /g,'_'));
  if(el) el.style.display='';
}

function renderScorers(d){
  const scorers = (d.fasit||{}).topp_scorere||[];
  if(!scorers.length){ $("#scorers").innerHTML=''; return; }

  let html = `<div class="scorers-box"><h3>⚽ Toppscorere</h3>`;
  scorers.forEach((s,i)=>{
    html += `<div class="scorer-row${i===0?' lead':''}">
      <span class="rk">${i+1}</span>
      ${flag(s.lag)}
      <span><strong>${esc(s.navn)}</strong> <span class="team-name">${esc(s.lag)}</span></span>
      <span class="goals">${s.maal}</span>
    </div>`;
  });
  html += '</div>';
  $("#scorers").innerHTML = html;
}

function renderStats(d){
  const st = d.statistikk||{}; let cards="";
  const ladder = (arr)=>arr.slice(0,5).map(x=>`<div><span>${esc(x.navn)}</span><span>${x.tipp} <small style="color:var(--slate)">(±${x.diff})</small></span></div>`).join("");
  if(st.antall_maal){
    const am = st.antall_maal;
    let inner = `<div class="big">${am.fasit}</div>`;
    if(am.spilt!=null && am.totalt) inner += `<p class="muted">mål så langt · ${am.spilt} av ${am.totalt} kamper spilt</p>`;
    if(am.projeksjon!=null){
      inner += `<p class="muted">Projisert sluttsum: <strong style="color:var(--ink)">~${am.projeksjon} mål</strong></p>`;
      const rows = (am.mot_projeksjon||[]).map((x,i)=>`<div><span>${i+1}. ${esc(x.navn)}</span><span>${x.tipp} <small style="color:var(--slate)">(±${x.diff})</small></span></div>`).join("");
      inner += `<div class="ladder">${rows}</div>`;
    } else {
      inner += `<div class="ladder">${ladder(am.tipp)}</div>`;
    }
    cards += `<div class="card" style="grid-column:1/-1"><h3>Antall mål</h3>${inner}</div>`;
  }
  if(st.antall_kort) cards += `<div class="card"><h3>Antall kort</h3><div class="big">${st.antall_kort.fasit}</div><div class="ladder">${ladder(st.antall_kort.tipp)}</div></div>`;
  if(st.toppscorer_treff) cards += `<div class="card"><h3>Riktig toppscorer</h3><div class="ladder">${st.toppscorer_treff.length?st.toppscorer_treff.map(n=>`<div>${esc(n)}</div>`).join(""):'<div style="color:var(--slate)">Ingen ennå</div>'}</div></div>`;
  if(st.vinner_treff) cards += `<div class="card"><h3>Riktig vinner</h3><div class="ladder">${st.vinner_treff.length?st.vinner_treff.map(n=>`<div>${esc(n)}</div>`).join(""):'<div style="color:var(--slate)">Ingen ennå</div>'}</div></div>`;
  $("#stats").innerHTML = cards ? `<h2>Statistikk</h2><div class="cards">${cards}</div>` : "";
}

const PICK_LBL = {H:'Hjemme', U:'Uavgjort', B:'Borte'};

function renderFordeling(d){
  const tf = (d.statistikk||{}).tippefordeling;
  if(!tf || !tf.dager || !tf.dager.length){ $("#fordeling").innerHTML=''; return; }
  const N = tf.antall_deltakere || 1;
  const dateLabel = dato => {
    const x = new Date(dato+'T12:00:00');
    const days=['søn','man','tir','ons','tor','fre','lør'];
    return `${days[x.getDay()]} ${x.getDate()}.${x.getMonth()+1}`;
  };

  // Flat liste over alle kamper for innsikter
  const alle = [];
  tf.dager.forEach(dag => dag.kamper.forEach(k => alle.push(k)));

  // --- Innsikter ---
  const pct = (k,p) => Math.round(100*k[p]/N);
  const maxPick = k => ['H','U','B'].reduce((a,b)=> k[b]>k[a]?b:a, 'H');
  const enig = [...alle].sort((a,b)=> pct(b,maxPick(b)) - pct(a,maxPick(a)))[0];
  const splittet = [...alle].sort((a,b)=> pct(a,maxPick(a)) - pct(b,maxPick(b)))[0];
  const ferdige = alle.filter(k=> k.fasit);
  const folketRiktig = ferdige.filter(k=> maxPick(k)===k.fasit).length;
  const overrasket = ferdige.filter(k=> maxPick(k)!==k.fasit)
    .sort((a,b)=> pct(b,maxPick(b)) - pct(a,maxPick(a)))[0];

  // Bare de mest relevante innsiktene, kort oppsummert
  const navnK = k => `${esc(k.home)}–${esc(k.away)}`;
  const chips = [];
  if(enig) chips.push(`<span class="fchip"><b>Mest enige:</b> ${navnK(enig)} (${pct(enig,maxPick(enig))}% ${PICK_LBL[maxPick(enig)].toLowerCase()})</span>`);
  if(splittet) chips.push(`<span class="fchip"><b>Mest splittet:</b> ${navnK(splittet)}</span>`);
  if(ferdige.length) chips.push(`<span class="fchip"><b>Folkets favoritt:</b> ${folketRiktig}/${ferdige.length} rett</span>`);
  if(overrasket) chips.push(`<span class="fchip"><b>Bombe:</b> ${navnK(overrasket)} ble ${PICK_LBL[overrasket.fasit].toLowerCase()}</span>`);
  const ins = `<div class="fchips">${chips.join('')}</div>`;

  const legend = `<div class="flegend">
    <span><span class="sw" style="background:#3F6CB5"></span><b>H</b> Hjemme</span>
    <span><span class="sw" style="background:#E08A2B"></span><b>U</b> Uavgjort</span>
    <span><span class="sw" style="background:#7C8696"></span><b>B</b> Borte</span>
    <span style="margin-left:auto">Gulkant = riktig utfall</span>
  </div>`;

  const seg = (k,p) => {
    const n = k[p], w = 100*n/N;
    if(!n) return '';
    const win = k.fasit===p ? ' win' : '';
    return `<div class="fseg ${p.toLowerCase()}${win}" style="width:${w}%" title="${PICK_LBL[p]}: ${n} av ${N}"><span>${p} ${Math.round(w)}%</span></div>`;
  };
  const matchHtml = k => {
    const navn = k.navn || {H:[],U:[],B:[]};
    let check = '';
    if(k.fasit){
      // Ferdigspilt: vis hvem som tok riktig
      const riktig = navn[k.fasit] || [];
      check = riktig.length
        ? `<div class="fcheck hit">✓ Riktig (${PICK_LBL[k.fasit].toLowerCase()}): ${riktig.map(esc).join(', ')}</div>`
        : `<div class="fcheck miss">✗ Ingen tippet riktig · fasit: ${PICK_LBL[k.fasit]}</div>`;
    } else {
      // Ikke spilt: vis hvem som har tippet hva
      const linje = p => (navn[p]||[]).length
        ? `<span class="ftip"><b>${p}</b> ${(navn[p]).map(esc).join(', ')}</span>` : '';
      const deler = ['H','U','B'].map(linje).filter(Boolean).join('');
      if(deler) check = `<div class="fpicks">${deler}</div>`;
    }
    return `<div class="fmatch">
      <div class="fhead">${flag(k.home)} ${esc(k.home)} <span class="vs">–</span> ${esc(k.away)} ${flag(k.away)}
        ${k.group?`<span class="grp">Gr. ${esc(k.group)}</span>`:''}</div>
      <div class="fbar">${seg(k,'H')}${seg(k,'U')}${seg(k,'B')}</div>
      ${check}</div>`;
  };
  const dayHtml = (dag,label) => `<div class="fday"><h3>${label||dateLabel(dag.dato)}</h3>${dag.kamper.map(matchHtml).join('')}</div>`;

  // Del opp i tidligere / i dag / kommende
  const today = new Date().toISOString().slice(0,10);
  const past = tf.dager.filter(x=> x.dato < today);
  const todayDag = tf.dager.find(x=> x.dato === today);
  const future = tf.dager.filter(x=> x.dato > today);

  let synlig = '';
  if(todayDag){ synlig = dayHtml(todayDag, 'I dag'); }
  else if(future.length){ synlig = dayHtml(future[0], 'Neste: '+dateLabel(future[0].dato)); }
  else if(past.length){ synlig = dayHtml(past[past.length-1]); }

  const restFuture = todayDag ? future : future.slice(1);
  const futureCount = restFuture.reduce((a,x)=>a+x.kamper.length,0);
  const pastCount = past.reduce((a,x)=>a+x.kamper.length,0);

  let toggles = '';
  if(restFuture.length){
    toggles += `<button class="old-toggle" onclick="toggleF(this,'f-future')">Vis kommende kamper (${futureCount}) ▾</button>
      <div id="f-future" style="display:none">${restFuture.map(x=>dayHtml(x)).join('')}</div>`;
  }
  if(past.length){
    toggles += `<button class="old-toggle" onclick="toggleF(this,'f-past')">Vis tidligere kamper (${pastCount}) ▾</button>
      <div id="f-past" style="display:none">${[...past].reverse().map(x=>dayHtml(x)).join('')}</div>`;
  }

  $("#fordeling").innerHTML = `<h2>Tippefordeling</h2>${ins}${legend}${synlig}${toggles}`;
}

function toggleF(btn, id){
  const el = document.getElementById(id);
  const open = el.style.display==='none';
  el.style.display = open ? '' : 'none';
  btn.textContent = btn.textContent.replace(open?'Vis':'Skjul', open?'Skjul':'Vis').replace(open?'▾':'▴', open?'▴':'▾');
}

let _podId = null;

async function renderPodcast(id, d){
  _podId = id;
  let pod=null;
  try{ pod = await jget(`${id}/podcast/siste.json`); }catch(e){}
  if(!pod){ $("#podcast").innerHTML=""; return; }

  let episoder=[];
  try{ episoder = await jget(`${id}/podcast/episoder.json`); }catch(e){}

  let manus=null;
  try{ manus = await jget(`${id}/podcast/manus-${pod.id}.json`); }catch(e){}

  let manusHtml = '';
  if(manus && manus.length){
    manusHtml = `<button class="manus-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent=this.nextElementSibling.classList.contains('open')?'Skjul manus':'Les manus'">Les manus</button>
    <div class="manus-box" id="manus-box">${manus.map(m=>`<div class="replikk"><span class="vert-navn">${esc(m.vert)}:</span>${esc(m.tekst)}</div>`).join('')}</div>`;
  }

  let playlistHtml = '';
  if(episoder.length > 0){
    playlistHtml = `<div class="playlist"><h4>Alle episoder</h4>`;
    episoder.forEach((ep,i)=>{
      const dato = new Date(ep.dato).toLocaleDateString('no-NO',{day:'numeric',month:'short'});
      const isActive = ep.id === pod.id;
      playlistHtml += `<div class="pl-item${isActive?' active':''}" onclick="playEpisode('${esc(ep.id)}','${esc(ep.lyd||'')}','${esc(ep.tittel||'')}')">
        <span class="pl-play">${isActive?'▶':'▷'}</span>
        <span class="pl-date">${dato}</span>
        <span>${esc(ep.tittel||ep.id)}</span>
      </div>`;
    });
    playlistHtml += '</div>';
  }

  $("#podcast").innerHTML = `<div class="pod"><h3 id="pod-title">🎙️ ${esc(pod.tittel||'Dagens sending')}</h3>
    <audio id="pod-audio" controls ${pod.lyd?`src="${id}/podcast/${esc(pod.lyd)}"`:''} style="width:100%;margin-top:6px"></audio>
    <p style="margin:8px 0 0;font-size:13px;color:#D8E8DC" id="pod-ingress">${esc(pod.ingress||'')}
    ${pod.feed?` · <a style="color:var(--gold)" href="${id}/feed.xml">RSS-feed</a>`:''}</p>
    ${manusHtml}
    ${playlistHtml}</div>`;
}

async function playEpisode(epId, lyd, tittel){
  const audio = document.getElementById('pod-audio');
  if(lyd && audio){
    audio.src = `${_podId}/podcast/${lyd}`;
    audio.play();
  }
  document.getElementById('pod-title').textContent = '🎙️ ' + (tittel||epId);
  document.querySelectorAll('.pl-item').forEach(el=>{
    el.classList.remove('active');
    el.querySelector('.pl-play').textContent = '▷';
  });
  event.currentTarget.classList.add('active');
  event.currentTarget.querySelector('.pl-play').textContent = '▶';

  // Last manus for valgt episode
  const box = document.getElementById('manus-box');
  if(box){
    try{
      const m = await jget(`${_podId}/podcast/manus-${epId}.json`);
      box.innerHTML = m.map(r=>`<div class="replikk"><span class="vert-navn">${esc(r.vert)}:</span>${esc(r.tekst)}</div>`).join('');
    }catch(e){ box.innerHTML = '<div class="replikk" style="color:rgba(255,255,255,.4)">Manus ikke tilgjengelig</div>'; }
  }
}
