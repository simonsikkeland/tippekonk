<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Piggy's tippekonkurranse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B132B; --paper:#FBF7F0; --line:#E3DACB; --pitch:#1E6F3C;
    --gold:#E8B83A; --gold-deep:#C9971F; --red:#C8472F; --slate:#5A6472; --chalk:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif}
  .display{font-family:'Archivo',sans-serif}
  header{background:var(--pitch);color:var(--chalk);padding:30px 20px 26px;border-bottom:4px solid var(--gold);position:relative;overflow:hidden}
  header .stripes{position:absolute;inset:0;opacity:.10;background:repeating-linear-gradient(90deg,transparent 0 56px,#fff 56px 57px)}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  .eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:800}
  h1{margin:6px 0 0;font-size:clamp(30px,7vw,46px);font-weight:900;line-height:1;letter-spacing:-1px}
  .sub{margin:8px 0 0;color:#D8E8DC;font-size:15px}
  main{max-width:1000px;margin:0 auto;padding:22px 20px 60px}
  select{font:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .meta{display:flex;gap:26px;flex-wrap:wrap;padding:14px 18px;background:#fff;border:1px solid var(--line);border-radius:12px;margin:18px 0}
  .meta .k{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);font-weight:800}
  .meta .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}

  /* Top area: scorers sidebar */
  .top-area{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-top:18px}
  @media(max-width:700px){.top-area{grid-template-columns:1fr}}
  .scorers-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;height:fit-content}
  .scorers-box h3{margin:0 0 10px;font-family:'Archivo';font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--slate)}
  .scorer-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .scorer-row img{width:20px;height:14px;object-fit:contain;border-radius:1px}
  .scorer-row:last-child{border-bottom:none}
  .scorer-row .rk{font-family:'Archivo';font-weight:900;color:var(--slate);min-width:20px}
  .scorer-row.lead .rk{color:var(--gold-deep)}
  .scorer-row .goals{font-family:'Archivo';font-weight:900;color:var(--pitch);margin-left:auto;font-size:16px}
  .scorer-row .team-name{color:var(--slate);font-size:12px}

  /* Kort (gule/røde) */
  .kort-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.kort-grid{grid-template-columns:1fr}}
  .kort-sum{float:right;font-family:'Archivo';font-weight:900;color:var(--pitch)}
  .kort-list{max-height:320px;overflow:auto;margin-top:8px}
  .kort-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .kort-row:last-child{border-bottom:none}
  .kort-row img{width:20px;height:14px;object-fit:contain;border-radius:1px}
  .kort-row .team-name{color:var(--slate);font-size:12px}
  .kort-row .kort-n{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:'Archivo';font-weight:900}
  .kort-dot{width:13px;height:17px;border-radius:2px;display:inline-block}
  .kort-dot.gul{background:#f4c20d}
  .kort-dot.rod{background:#d83a34}
  .kort-total{margin-top:16px;text-align:center}

  /* Poeng per kategori */
  .kat-tab{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  .kat-tab th{font-size:10px;color:var(--slate);font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--line);text-align:center}
  .kat-tab th:first-child,.kat-tab td:first-child{text-align:left;position:sticky;left:0;background:#fff}
  .kat-tab td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center}
  .kat-tab tr:last-child td{border-bottom:none}
  .kat-tab .kat-tot{font-weight:900;color:var(--pitch)}

  /* Matches */
  .match-day{margin-bottom:16px}
  .match-day h3{font-family:'Archivo';font-size:14px;color:var(--slate);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}
  .match-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:5px;gap:8px}
  .match-card .team{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .match-card .team.right{justify-content:flex-end;text-align:right}
  .match-card .team img{width:20px;height:14px;object-fit:contain;border-radius:1px}
  .match-card .score{font-family:'Archivo';font-weight:900;font-size:18px;color:var(--pitch);min-width:56px;text-align:center}
  .match-card .score.pending{color:var(--slate);font-size:13px;font-weight:600}
  .match-card .score.live{color:var(--red)}
  .match-card .grp-tag{font-size:10px;color:var(--slate)}
  .old-toggle{background:none;border:1px solid var(--line);border-radius:8px;padding:8px 16px;font:inherit;font-size:13px;font-weight:700;color:var(--slate);cursor:pointer;margin-bottom:14px;transition:all .15s}
  .old-toggle:hover{border-color:var(--gold);color:var(--ink)}

  /* Groups */
  .grp-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .grp-btn{font:inherit;font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;border:2px solid var(--line);background:#fff;cursor:pointer;transition:all .15s}
  .grp-btn:hover{border-color:var(--gold)}
  .grp-btn.active{background:var(--pitch);color:#fff;border-color:var(--pitch)}
  .grp-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:8px}
  .grp-table th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);border-bottom:2px solid var(--line)}
  .grp-table th.num{text-align:center}
  .grp-table td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:15px}
  .grp-table td.num{text-align:center;font-family:'Archivo';font-weight:800;font-variant-numeric:tabular-nums}
  .grp-table tr:last-child td{border-bottom:none}
  .grp-table tr:nth-child(-n+2) td.num{color:var(--pitch)}
  .grp-table .team-cell{display:flex;align-items:center;gap:8px}
  .grp-table .team-cell img{width:22px;height:15px;object-fit:contain;border-radius:1px}

  /* Podium */
  .podium{display:flex;gap:12px;margin-bottom:18px}
  .podium-card{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 14px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .08s,box-shadow .12s}
  .podium-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
  .podium-card.gold{border-color:var(--gold);background:linear-gradient(180deg,#FFF9EB,#fff)}
  .podium-card.silver{border-color:#C0C0C0;background:linear-gradient(180deg,#F5F5F5,#fff)}
  .podium-card.bronze{border-color:#CD7F32;background:linear-gradient(180deg,#FFF5EB,#fff)}
  .podium-medal{font-size:28px}
  .podium-name{font-weight:800;font-size:18px;font-family:'Archivo'}
  .podium-pts{font-family:'Archivo';font-size:22px;font-weight:900;color:var(--pitch)}

  /* Board */
  .board{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .hrow,.row{display:grid;grid-template-columns:56px 1fr 96px 36px;align-items:center}
  .hrow{padding:11px 16px;border-bottom:2px solid var(--line);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);font-weight:800}
  .row{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .row:hover{background:#F3ECE0}
  .pos{font-family:'Archivo';font-size:21px;font-weight:900}
  .pos.lead{color:var(--gold-deep)}
  .nm{font-weight:700;font-size:16px}
  .pts{font-family:'Archivo';text-align:right;font-size:23px;font-weight:900;color:var(--pitch);font-variant-numeric:tabular-nums}
  .chev{text-align:right;color:var(--slate)}
  .detail{padding:6px 16px 16px;background:#FAF5EC;border-bottom:1px solid var(--line);display:none}
  .detail.open{display:block}
  .dl{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px dashed var(--line)}
  .dl:last-child{border-bottom:none}
  .dl .p{font-weight:800;font-variant-numeric:tabular-nums}
  .dl .p.zero{color:var(--slate)}
  .dl .p.win{color:var(--pitch)}
  .dl.has-k{cursor:pointer}
  .chev2{color:var(--slate);font-size:11px;display:inline-block;transition:transform .12s}
  .dl.has-k.open .chev2{transform:rotate(90deg)}
  .kamper-list{display:none;padding:2px 0 8px 14px}
  .kamper-list.open{display:block}
  .km{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;color:var(--slate)}
  .km img{width:20px;height:14px;object-fit:contain;border-radius:1px;vertical-align:middle;margin-right:4px}
  .km-res{font-size:11px;color:var(--pitch);font-weight:700;white-space:nowrap;padding-left:10px}
  .bk-note{color:var(--slate);font-size:13px;margin:4px 0 10px}
  .bk-champ{background:linear-gradient(180deg,#FFF9EB,#fff);border:1px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:15px;margin-bottom:12px}
  .bk-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
  .bk-col{flex:0 0 190px;display:flex;flex-direction:column;gap:10px;justify-content:space-around}
  .bk-round{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);font-weight:700;text-align:center}
  .bk-match{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .bk-side{display:flex;align-items:center;gap:6px;padding:6px 8px;font-size:13px;border-bottom:1px solid var(--line)}
  .bk-side:last-child{border-bottom:none}
  .bk-win{background:#F0F9F1;font-weight:700}
  .bk-seed{font-size:10px;color:var(--slate);background:#F0EEE6;border-radius:4px;padding:1px 4px;font-weight:700;min-width:22px;text-align:center;flex:none}
  .bk-tbd{color:var(--slate)}
  .bk-team{display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0}
  .bk-team img{width:18px;height:12px;object-fit:contain;flex:none}
  .bk-score{margin-left:auto;font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;color:var(--ink);flex:none;padding-left:6px}
  .bk-side.bk-win .bk-score{color:var(--pitch)}
  .bk-pen{font-weight:700;font-size:10px;color:var(--slate);margin-left:2px}
  /* Toveis (speilet) brakett — slot-basert layout med forbindelseslinjer */
  .bk2{--bkgap:32px;--bkline:#c9bfa9;display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;align-items:stretch}
  .bk2-left,.bk2-right{display:flex;gap:var(--bkgap);align-items:stretch}
  .bk2 .bk-col{flex:0 0 150px;display:flex;flex-direction:column;gap:0;justify-content:flex-start}
  .bk-slots{flex:1;display:flex;flex-direction:column}
  .bk-slot{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:42px}
  .bk2 .bk-match{width:100%}
  .bk-center{flex:0 0 168px;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .bk-champ-mini{background:#FFF9EB;border:1px solid var(--gold);border-radius:8px;padding:8px;text-align:center;font-weight:800;font-size:13px}
  /* Elbow-linjer mellom kampene: utgående (mot neste runde), vertikal (par-kobling), innkommende (til boks) */
  .bk-jl{display:none}
  .bk2-left .bk-col:not(:last-child) .bk-slot::after{content:"";position:absolute;top:50%;left:100%;width:calc(var(--bkgap)/2);height:1.5px;background:var(--bkline)}
  .bk2-left .bk-col:not(:first-child) .bk-slot::before{content:"";position:absolute;top:25%;height:50%;left:calc(var(--bkgap)/-2);width:1.5px;background:var(--bkline)}
  .bk2-left .bk-col:not(:first-child) .bk-jl{display:block;position:absolute;top:50%;left:calc(var(--bkgap)/-2);width:calc(var(--bkgap)/2);height:1.5px;background:var(--bkline)}
  .bk2-right .bk-col:not(:first-child) .bk-slot::after{content:"";position:absolute;top:50%;right:100%;width:calc(var(--bkgap)/2);height:1.5px;background:var(--bkline)}
  .bk2-right .bk-col:not(:last-child) .bk-slot::before{content:"";position:absolute;top:25%;height:50%;right:calc(var(--bkgap)/-2);width:1.5px;background:var(--bkline)}
  .bk2-right .bk-col:not(:last-child) .bk-jl{display:block;position:absolute;top:50%;right:calc(var(--bkgap)/-2);width:calc(var(--bkgap)/2);height:1.5px;background:var(--bkline)}
  /* Sikker (grønn) / usikker (rød) plass i 16-delsfinalen */
  .bk-sure{background:#EAF4EC;box-shadow:inset 3px 0 0 var(--pitch)}
  .bk-unsure{background:#FBEDEA;box-shadow:inset 3px 0 0 var(--red)}
  .bk-side-tbd{justify-content:center;color:var(--slate)}
  /* Fullskjerm sluttspill */
  .ss-fs{position:fixed;inset:0;background:var(--paper);z-index:1000;display:flex;flex-direction:column;padding:14px 20px}
  .ss-fs-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex:none}
  .ss-fs-body{flex:1;overflow:auto}
  .ss-fs-body .bk2 .bk-col{flex:0 0 150px}
  .ss-fs-body .bk-center{flex:0 0 172px}
  .ss-fs-body .bk2{--bkgap:26px}
  /* Fane-bryter (Gruppespill / Sluttspill) */
  .tabs{display:flex;gap:8px;margin:22px 0 4px;border-bottom:2px solid var(--line)}
  .tab-btn{font:inherit;font-weight:800;font-family:'Archivo',sans-serif;font-size:15px;cursor:pointer;
    padding:10px 18px;border:none;background:none;color:var(--slate);border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab-btn:hover{color:var(--ink)}
  .tab-btn.aktiv{color:var(--pitch);border-bottom-color:var(--pitch)}
  .fane{display:none}
  .fane.aktiv{display:block}

  /* Sluttspillkamper: rundenavn-tag + avansement-duell */
  .ko-round-tag{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
    color:var(--gold-deep);background:#FFF4D6;border-radius:6px;padding:2px 7px}
  .duell{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:-4px 0 14px}
  .duell-bar{display:flex;height:26px;border-radius:6px;overflow:hidden;background:var(--paper);font-size:11px;font-weight:800}
  .duell-seg{display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;min-width:0;
    white-space:nowrap;transition:filter .15s}
  .duell-seg:hover{filter:brightness(1.08)}
  .duell-seg.s-a{background:var(--pitch)}
  .duell-seg.s-begge{background:var(--gold-deep)}
  .duell-seg.s-b{background:#2b6cb0}
  .duell-seg.s-ingen{background:var(--slate)}
  .duell-seg.tom{display:none}
  .duell-legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .duell-chip{font-size:11px;color:var(--slate);cursor:pointer;border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .duell-chip:hover{background:var(--paper)}
  .duell-chip i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
  .duell-chip.warn{color:var(--gold-deep);border-color:var(--gold);font-weight:700}
  .duell-names{display:none;flex-wrap:wrap;gap:4px;margin-top:8px}
  .duell-names.open{display:flex}
  .duell-names .nm-chip{font-size:12px;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 8px}

  /* Gruppe-rutenett under braketten */
  .bk-sub{margin:18px 0 2px}
  /* R16 ranking */
  .r16-ranking{display:flex;gap:10px;overflow-x:auto;padding:8px 0 12px;align-items:flex-end}
  .r16-card{flex:0 0 auto;min-width:100px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px 10px;text-align:center;position:relative;display:flex;flex-direction:column}
  .r16-card.r16-gold{border-color:var(--gold);background:linear-gradient(135deg,#FFF9E8,#fff)}
  .r16-card .r16-pos{font-family:'Archivo';font-weight:900;font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:.5px}
  .r16-card.r16-gold .r16-pos{color:var(--gold-deep)}
  .r16-card .r16-name{font-weight:700;font-size:14px;margin:4px 0 2px;white-space:nowrap}
  .r16-card .r16-score{font-family:'Archivo';font-weight:900;font-size:22px;color:var(--pitch)}
  .r16-card .r16-of{font-size:11px;color:var(--slate)}
  .r16-flags{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;justify-items:center;margin:6px 0 2px;min-height:20px}
  .r16-flag{display:inline-flex}
  .r16-flag img{width:20px;height:14px;object-fit:contain;border-radius:2px}
  .r16-bar{margin-top:auto;height:5px;border-radius:3px;background:var(--line)}
  .r16-bar-fill{height:100%;border-radius:3px;background:var(--pitch)}

  .grp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  @media(max-width:900px){.grp-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}}
  .grp-mini{border:2px solid var(--line);border-radius:12px;padding:8px 10px 4px;background:#fff}
  .grp-mini.grp-ferdig{border-color:var(--pitch)}
  .grp-mini.grp-uferdig{border-color:var(--red)}
  .grp-mini-h{font-weight:800;font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
  .grp-mini-tag{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:2px 6px;border-radius:6px}
  .grp-ferdig .grp-mini-tag{background:#EAF4EC;color:var(--pitch)}
  .grp-uferdig .grp-mini-tag{background:#FBEDEA;color:var(--red)}
  .grp-mini .grp-table{border:none;border-radius:0;margin:0}
  .grp-mini .grp-table td,.grp-mini .grp-table th{padding:5px 8px;font-size:13px}
  .grp-mini .grp-table th{font-size:10px}
  .pg-svg{width:100%;height:auto;background:#fff;border:1px solid var(--line);border-radius:10px}
  .pg-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:8px;font-size:13px}
  .pg-legend .lg{display:inline-flex;align-items:center;gap:5px}
  .pg-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .hm-scroll{overflow-x:auto;padding-bottom:8px}
  .hm-row{display:flex;align-items:center;gap:2px;margin-bottom:2px}
  .hm-name{flex:0 0 116px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hm-name b{color:var(--slate)}
  .hm-cell{flex:0 0 16px;height:16px;border-radius:3px;background:#ececec;font-size:9px;text-align:center;color:#aaa;line-height:16px}
  .hm-cell.hit{background:#46b46a}
  .hm-cell.wrong{background:#e07a72}
  .hm-h{background:none;color:var(--slate)}
  .lk-scroll{overflow-x:auto}
  .lk-tab{border-collapse:collapse;font-size:11px}
  .lk-tab th{color:var(--slate);font-weight:700;padding:2px 4px;font-size:10px}
  .lk-tab td{width:26px;height:24px;text-align:center;border:2px solid #fff;color:#333;font-variant-numeric:tabular-nums}
  .lk-tab td.lk-self{background:#f3f1ea}
  .bn-list{margin-top:6px;font-size:13px}
  .bn-row{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px dashed var(--line)}
  .bn-row:last-child{border-bottom:none}
  h2{font-family:'Archivo';font-size:20px;margin:30px 0 12px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h3{margin:0 0 4px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--slate)}
  .card .big{font-family:'Archivo';font-size:30px;font-weight:900}
  .card .muted{margin:6px 0;color:var(--slate);font-size:13px}
  .bigrow{display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start}
  .bigrow .muted{margin:2px 0 0;max-width:180px}
  .ladder{margin-top:8px;font-size:14px}
  .ladder div{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}

  audio{width:100%;margin-top:6px}
  .manus-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 14px;font:inherit;font-size:13px;font-weight:700;color:#D8E8DC;cursor:pointer;margin-top:10px;transition:all .15s}

  .manus-box{margin-top:12px;padding:14px;background:rgba(0,0,0,.2);border-radius:10px;display:none}
  .manus-box.open{display:block}
  .oppsummering{margin-top:14px;padding:14px;background:rgba(0,0,0,.2);border-radius:10px}
  .opp-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .opp-head h4{margin:0;font-size:14px;color:#D8E8DC}
  .opp-tekst{margin:0;font-size:14px;line-height:1.55;color:#E8F2EA;white-space:pre-wrap}
  .kopier-btn{background:var(--gold);border:none;border-radius:8px;padding:5px 12px;font:inherit;font-size:12px;font-weight:700;color:#1a1a1a;cursor:pointer;flex:none}
  .kopier-btn:hover{filter:brightness(1.08)}
  .replikk{margin-bottom:10px;font-size:14px;line-height:1.5;color:#D8E8DC}
  .replikk:last-child{margin-bottom:0}
  .replikk .vert-navn{font-weight:800;color:var(--gold);margin-right:6px}
  .playlist{margin-top:14px;border-top:1px solid rgba(255,255,255,.15);padding-top:10px}
  .playlist h4{margin:0 0 8px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:800}
  .pl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s;font-size:14px;color:#D8E8DC}
  .pl-item:hover{background:rgba(255,255,255,.1)}
  .pl-item.active{background:rgba(255,255,255,.15);font-weight:700}
  .pl-item .pl-date{color:rgba(255,255,255,.5);font-size:12px;min-width:50px}
  .pl-item .pl-play{color:var(--gold);font-size:16px}
  /* Tippefordeling (hvem tippet hva) */
  .fchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .fchip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--slate)}

  .fday h3{font-family:'Archivo';font-size:14px;color:var(--slate);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}
  .fmatch{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:6px}
  .fmatch .fhead{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;margin-bottom:8px}

  .fmatch .fhead .grp{margin-left:auto;font-size:10px;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .fbar{display:flex;height:26px;border-radius:6px;overflow:hidden;background:#F3ECE0}
  .fseg{display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#fff;min-width:0;transition:width .3s;position:relative}
  .fseg.h{background:#3F6CB5}
  .fseg.u{background:#E08A2B}
  .fseg.b{background:#7C8696}
  .fseg.win{box-shadow:inset 0 0 0 3px var(--gold)}
  .fseg span{padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .flegend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--slate);margin:2px 0 14px}
  .flegend b{font-weight:800}
  .flegend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .fcheck{font-size:11px;color:var(--slate);margin-top:5px}
  .fcheck.hit{color:var(--pitch);font-weight:700}

  .fpicks{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:7px;font-size:12px;color:var(--slate)}
  .ftip b{display:inline-block;min-width:15px;text-align:center;font-family:'Archivo';font-weight:900;color:var(--ink);margin-right:3px}
  .empty{text-align:center;padding:54px 20px;background:#fff;border:1px dashed var(--line);border-radius:12px;color:var(--slate)}
  .empty .big{font-family:'Archivo';font-size:20px;font-weight:800;color:var(--ink)}
  footer{max-width:1000px;margin:0 auto;padding:10px 20px 40px;color:var(--slate);font-size:12px}

  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}

</head>
<body>
<header>
  <div class="stripes"></div>
  <div class="wrap" style="position:relative">
    <div class="eyebrow">Piggy's · tippekonkurranse</div>
    <h1 id="title">Stillingen</h1>
    <p class="sub" id="subtitle">Laster …</p>
  </div>
</header>
<main>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <label for="tsel" style="font-size:13px;color:var(--slate);font-weight:700">Mesterskap:</label>
    <select id="tsel"></select>
    <span id="updated" style="font-size:12px;color:var(--slate)"></span>
    <button class="old-toggle" style="margin-left:auto" onclick="openSS()">⛶ Sluttspill i fullskjerm</button>
  </div>

  <div id="ss-fs" class="ss-fs" style="display:none">
    <div class="ss-fs-bar"><strong style="font-size:16px">Sluttspill-brakett</strong>
      <button class="old-toggle" onclick="closeSS()">Lukk ✕</button></div>
    <div id="ss-fs-body" class="ss-fs-body"></div>
  </div>

  <div class="meta" id="meta"></div>

  <!-- 1. Pall (topp 3) + toppscorere -->
  <div class="top-area">
    <div id="board"></div>
    <div id="scorers"></div>
  </div>

  <!-- 1b. Poeng per kategori -->
  <div id="kategorier"></div>

  <!-- 2. Podcast -->
  <div id="podcast"></div>

  <!-- Fane-bryter: Sluttspill / Gruppespill -->
  <div class="tabs" id="tabs">
    <button class="tab-btn" data-fane="sluttspill" onclick="visFane('sluttspill')">Sluttspill</button>
    <button class="tab-btn" data-fane="gruppespill" onclick="visFane('gruppespill')">Gruppespill</button>
  </div>

  <!-- Fane: Sluttspill -->
  <div id="fane-sluttspill" class="fane">
    <div id="sluttspillkamper"></div>
    <div id="sluttspill"></div>
  </div>

  <!-- Fane: Gruppespill -->
  <div id="fane-gruppespill" class="fane">
    <div id="kamper"></div>
    <div id="fordeling"></div>
    <div id="grupper"></div>
    <div id="stats"></div>
    <div id="kort"></div>
  </div>

  <!-- Felles bunn: flere visualiseringer -->
  <div id="poenggraf"></div>
  <div id="bonus"></div>
  <div id="heatmap"></div>
  <div id="likhet"></div>
</main>
<footer id="foot"></footer>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let _flagg = {};
function flag(team){ const u=_flagg[team]; return u?`<img src="${esc(u)}" alt="${esc(team)}">`:''; }

async function jget(u){ const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(u); return r.json(); }

async function init(){
  let manifest=[];
  try{ manifest = await jget("manifest.json"); }catch(e){}
  const sel = $("#tsel");
  if(!manifest.length){ $("#subtitle").textContent="Ingen mesterskap publisert ennå."; return; }
  manifest.forEach(m=>{
    const o=document.createElement("option"); o.value=m.id; o.textContent=m.kort_navn; sel.appendChild(o);
  });
  sel.onchange=()=>load(sel.value);
  load(manifest[manifest.length-1].id);
}

async function load(id){
  let d;
  try{ d = await jget(`${id}/stilling.json`); }
  catch(e){ $("#board").innerHTML=`<div class="empty"><div class="big">Ingen data ennå</div><p>Last opp ark for dette mesterskapet.</p></div>`; return; }

  _flagg = (d.fasit||{}).flagg||{};

  $("#title").textContent = d.turnering.kort_navn || "Stillingen";
  $("#subtitle").textContent = d.turnering.navn + (d.turnering.vert?` · ${d.turnering.vert}`:"");
  $("#updated").textContent = d.oppdatert ? "Oppdatert "+new Date(d.oppdatert).toLocaleString("no-NO") : "";

  const gruppeFerdig = (d.fasit||{}).gruppespill_ferdig;
  const statusText = gruppeFerdig ? '<span class="pill">I gang</span>' : d.har_fasit ? '<span class="pill" style="background:#5a9;color:#042">Gruppespill</span>' : 'Ikke startet';
  $("#meta").innerHTML = `
    <div><div class="k">Deltakere</div><div class="v">${d.stilling.length}</div></div>
    <div><div class="k">Status</div><div class="v">${statusText}</div></div>`;

  // Pall (topp 3)
  let bHtml = '<h2 style="margin-top:0">Stilling</h2>';
  if(d.har_fasit && d.stilling.length >= 3){
    const medals = ['🥇','🥈','🥉'];
    bHtml += '<div class="podium">' + d.stilling.slice(0,3).map((s,i)=>`
      <div class="podium-card ${i===0?'gold':i===1?'silver':'bronze'}" onclick="openPlayer(${i})" title="Klikk for poengfordeling">
        <span class="podium-medal">${medals[i]}</span>
        <span class="podium-name">${esc(s.navn)}</span>
        <span class="podium-pts">${s.poeng}p</span>
      </div>`).join('') + '</div>';
  }

  // Full tabell (skjult bak knapp)
  let rows = `<div class="board"><div class="hrow"><span>Plass</span><span>Deltaker</span><span style="text-align:right">Poeng</span><span></span></div>`;
  d.stilling.forEach((s,i)=>{
    rows += `<div class="row board-row" data-idx="${i}" onclick="toggle(${i})">
      <span class="pos ${i===0&&d.har_fasit?'lead':''}">${d.har_fasit?s.plass:'–'}</span>
      <span class="nm">${esc(s.navn)}</span>
      <span class="pts" style="${d.har_fasit?'':'color:var(--slate)'}">${d.har_fasit?s.poeng:'—'}</span>
      <span class="chev">${d.har_fasit?'▸':''}</span></div>
      <div class="detail" id="det${i}">${(s.linjer||[]).map(l=>{
        const sub = (l.kamper&&l.kamper.length)?'k':(l.grupper&&l.grupper.length)?'g':(l.lag&&l.lag.tippet&&l.lag.tippet.length)?'l':'';
        let row = `<div class="dl${sub?' has-k':''}"${sub?` onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')"`:''}>
          <span>${esc(l.label)} <span style="color:var(--slate);font-size:12px">· ${esc(l.detail)}</span>${sub?' <span class="chev2">▸</span>':''}</span>
          <span class="p ${l.pts>0?'win':'zero'}">${l.pts}p</span></div>`;
        if(sub==='k') row += `<div class="kamper-list">${l.kamper.map(k=>`
          <div class="km"><span>${esc(k.home)} – ${esc(k.away)}</span><span class="km-res">${PICK_LBL[k.res]||k.res}</span></div>`).join("")}</div>`;
        if(sub==='g') row += `<div class="kamper-list">${l.grupper.map(g=>`
          <div class="km"><span>${esc(g.gruppe)}: <b>${esc(g.fasit)}</b></span><span class="km-res" style="color:${g.hit?'var(--pitch)':'var(--slate)'}">${g.hit?'✓ '+esc(g.tipp):'✗ '+esc(g.tipp)}</span></div>`).join("")}</div>`;
        if(sub==='l'){
          const bommet = (l.lag.bommet||[]).map(t=>`
            <div class="km"><span>${flag(t.lag)} ${esc(t.lag)}</span><span class="km-res" style="color:var(--red)">✗ ikke tippet</span></div>`).join("");
          row += `<div class="kamper-list"><div class="km" style="color:var(--slate);font-size:12px;border:none"><span>${l.lag.bekreftet} av ${l.lag.forventet} lag bekreftet</span></div>${l.lag.tippet.map(t=>`
            <div class="km"><span>${flag(t.lag)} ${esc(t.lag)}</span><span class="km-res" style="color:${t.hit?'var(--pitch)':'var(--slate)'}">${t.hit?'✓':'–'}</span></div>`).join("")}${bommet?'<div class="km" style="color:var(--slate);font-size:12px;border:none;margin-top:6px"><span>Bommet på:</span></div>'+bommet:''}</div>`;
        }
        return row;
      }).join("")}</div>`;
  });
  rows += `</div>`;
  if(d.har_fasit){
    bHtml += `<button class="old-toggle" onclick="toggleF(this,'full-board')">Vis hele tabellen (${d.stilling.length}) ▾</button>
      <div id="full-board" style="display:none">${rows}</div>`;
  } else {
    bHtml += rows;
  }
  $("#board").innerHTML = bHtml;

  renderKategorier(d);
  renderKamper(d);
  renderGrupper(d);
  renderScorers(d);
  renderStats(d);
  renderKort(d);
  renderFordeling(d);
  renderSluttspillkamper(d);
  renderSluttspill(d);
  let hist=[]; try{ hist = await jget(`${id}/poenghistorikk.json`); }catch(e){}
  renderPoenggraf(hist);
  renderBonus(d);
  renderHeatmap(d);
  renderLikhet(d);
  renderPodcast(id, d);
  $("#foot").textContent = "Drevet av GitHub Pages. Resultater fra football-data.org. Alt bygges automatisk.";

  // Velg fane: lagret valg, ellers sluttspill når gruppespillet er ferdig.
  let fane = null;
  try{ fane = localStorage.getItem('fane'); }catch(e){}
  if(fane!=='gruppespill' && fane!=='sluttspill'){
    fane = (d.fasit||{}).gruppespill_ferdig ? 'sluttspill' : 'gruppespill';
  }
  visFane(fane);
}

function toggle(i){ $("#det"+i)?.classList.toggle("open"); }

// Klikk på pall-kort (eller annet): åpne full tabell, vis spillerens
// poengfordeling, og bla dit.
function openPlayer(i){
  const full = document.getElementById('full-board');
  if(full && full.style.display === 'none'){
    const btn = full.previousElementSibling;
    if(btn && btn.classList.contains('old-toggle')) toggleF(btn, 'full-board');
  }
  document.querySelectorAll('.detail.open').forEach(d=>{ if(d.id!=='det'+i) d.classList.remove('open'); });
  const det = document.getElementById('det'+i);
  if(det){
    det.classList.add('open');
    (det.previousElementSibling || det).scrollIntoView({behavior:'smooth', block:'center'});
  }
}

const erGruppekamp = k => !k.stage || k.stage==='GROUP_STAGE';

function renderKamper(d){
  const kamper = ((d.fasit||{}).kamper||[]).filter(erGruppekamp);
  if(!kamper.length){ $("#kamper").innerHTML=''; return; }

  const today = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);

  // All matches from first day to tomorrow
  const relevant = kamper.filter(k=> k.dato <= tomorrow);
  if(!relevant.length){ $("#kamper").innerHTML=''; return; }

  const byDate = {};
  relevant.forEach(k=>{ (byDate[k.dato]=byDate[k.dato]||[]).push(k); });
  const dates = Object.keys(byDate).sort().reverse(); // newest first

  const dateLabel = dato => {
    if(dato===today) return 'I dag';
    if(dato===tomorrow) return 'I morgen';
    const d = new Date(dato+'T12:00:00');
    const days=['Søn','Man','Tirs','Ons','Tors','Fre','Lør'];
    return `${days[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}`;
  };

  // I dag først, så i morgen; eldre dager kollapses
  const recentDates = dates.filter(d=> d>=today).sort();
  const olderDates = dates.filter(d=> d<today);

  let html = '<h2>Gruppespillkamper</h2>';

  // Today + tomorrow
  recentDates.forEach(dato=>{
    html += renderMatchDay(dato, byDate[dato], dateLabel);
  });

  // Older matches collapsed
  if(olderDates.length){
    html += `<button class="old-toggle" onclick="toggleOld(this)">Vis tidligere kamper (${olderDates.length} dager)</button>`;
    html += '<div id="old-matches" style="display:none">';
    olderDates.forEach(dato=>{
      html += renderMatchDay(dato, byDate[dato], dateLabel);
    });
    html += '</div>';
  }

  $("#kamper").innerHTML = html;
}

function renderMatchDay(dato, matches, dateLabel){
  let html = `<div class="match-day"><h3>${dateLabel(dato)}</h3>`;
  matches.forEach(k=>{
    const finished = k.status==='FINISHED';
    const live = k.status==='IN_PLAY'||k.status==='PAUSED';
    const scoreText = finished ? `${k.home_score} – ${k.away_score}`
      : live ? `${k.home_score??0} – ${k.away_score??0}` : 'vs';
    const cls = live ? 'score live' : finished ? 'score' : 'score pending';
    const grp = k.group?`<span class="grp-tag">${esc(k.group.replace('GROUP_','Gr. '))}</span>`:'';
    html += `<div class="match-card">
      <div class="team right">${grp} ${flag(k.home)} ${esc(k.home)}</div>
      <div class="${cls}">${live?'LIVE ':''} ${scoreText}</div>
      <div class="team">${esc(k.away)} ${flag(k.away)}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function toggleOld(btn){
  const el=document.getElementById('old-matches');
  if(el.style.display==='none'){ el.style.display=''; btn.textContent='Skjul tidligere kamper'; }
  else{ el.style.display='none'; btn.textContent=btn.textContent.replace('Skjul','Vis'); }
}

// --- Sluttspillkamper ---
const RUNDE_NAVN = {LAST_32:'16-delsfinale', ROUND_OF_32:'16-delsfinale',
  LAST_16:'8-delsfinale', ROUND_OF_16:'8-delsfinale',
  QUARTER_FINALS:'Kvartfinale', QUARTER_FINAL:'Kvartfinale',
  SEMI_FINALS:'Semifinale', SEMI_FINAL:'Semifinale',
  THIRD_PLACE:'Bronsefinale', '3RD_PLACE':'Bronsefinale', FINAL:'Finale'};
// Hvilken runde et lag når ved å VINNE en kamp i denne runden (for avansement-tips).
const NESTE_RUNDE = {LAST_32:'r8', ROUND_OF_32:'r8', LAST_16:'kvart', ROUND_OF_16:'kvart',
  QUARTER_FINALS:'semi', QUARTER_FINAL:'semi', SEMI_FINALS:'finale', SEMI_FINAL:'finale',
  THIRD_PLACE:'bronse', '3RD_PLACE':'bronse', FINAL:'vm'};

function renderSluttspillkamper(d){
  const el = $("#sluttspillkamper");
  const alle = ((d.fasit||{}).kamper||[]).filter(k=> !erGruppekamp(k));
  // Bare kamper med begge lag kjent (oppsett avgjort)
  const kamper = alle.filter(k=> (k.home||'').trim() && (k.away||'').trim());
  if(!kamper.length){ el.innerHTML=''; return; }

  const today = new Date().toISOString().slice(0,10);
  const dateLabel = dato => {
    const dd = new Date(dato+'T12:00:00');
    const days=['Søn','Man','Tirs','Ons','Tors','Fre','Lør'];
    const lbl = `${days[dd.getDay()]} ${dd.getDate()}.${dd.getMonth()+1}`;
    return dato===today ? 'I dag' : lbl;
  };

  // Eldre (ferdige) dager bakerst/kollapset; kommende + i dag øverst
  const byDate = {};
  kamper.forEach(k=>{ (byDate[k.dato]=byDate[k.dato]||[]).push(k); });
  const dates = Object.keys(byDate).sort();
  const kommende = dates.filter(dt=> dt>=today);
  const eldre = dates.filter(dt=> dt<today).reverse();

  let html = '<h2>Sluttspillkamper</h2>';
  kommende.forEach(dt=>{ html += renderKoDag(d, dt, byDate[dt], dateLabel); });
  if(eldre.length){
    html += `<button class="old-toggle" onclick="toggleOld(this)">Vis spilte sluttspillkamper (${eldre.length} dager)</button>`;
    html += '<div id="old-matches" style="display:none">';
    eldre.forEach(dt=>{ html += renderKoDag(d, dt, byDate[dt], dateLabel); });
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderKoDag(d, dato, matches, dateLabel){
  let html = `<div class="match-day"><h3>${dateLabel(dato)}</h3>`;
  matches.forEach((k,i)=>{
    const finished = k.status==='FINISHED';
    const live = k.status==='IN_PLAY'||k.status==='PAUSED';
    const scoreText = finished ? `${k.home_score} – ${k.away_score}`
      : live ? `${k.home_score??0} – ${k.away_score??0}` : 'vs';
    const cls = live ? 'score live' : finished ? 'score' : 'score pending';
    const runde = RUNDE_NAVN[k.stage] || '';
    const tag = runde?`<span class="ko-round-tag">${esc(runde)}</span>`:'';
    html += `<div class="match-card">
      <div class="team right">${tag} ${flag(k.home)} ${esc(k.home)}</div>
      <div class="${cls}">${live?'LIVE ':''} ${scoreText}</div>
      <div class="team">${esc(k.away)} ${flag(k.away)}</div>
    </div>`;
    // Avansement-duell kun for kommende kamper (ikke ferdigspilte)
    if(!finished){ html += renderDuell(d, k); }
  });
  html += '</div>';
  return html;
}

function renderDuell(d, k){
  const st = d.statistikk||{};
  const av = st.avansement||{};
  const alle = st.antall_deltakere||0;
  const R = NESTE_RUNDE[k.stage];
  if(!R || !alle) return '';
  const nrm = s => String(s||'').trim().toLowerCase();
  const navnA = (av[nrm(k.home)]?.runder?.[R])||[];
  const navnB = (av[nrm(k.away)]?.runder?.[R])||[];
  const setA = new Set(navnA), setB = new Set(navnB);
  const kunA = navnA.filter(n=>!setB.has(n));
  const begge = navnA.filter(n=> setB.has(n));
  const kunB = navnB.filter(n=>!setA.has(n));
  const dekket = new Set([...navnA, ...navnB]);
  const ingenNavn = (d.stilling||[]).map(s=>s.navn).filter(n=> !dekket.has(n));

  const total = alle || (kunA.length+begge.length+kunB.length+ingenNavn.length) || 1;
  const pct = n => (n/total*100).toFixed(1);
  const segs = [
    {n:kunA.length, cls:'s-a', navn:kunA},
    {n:begge.length, cls:'s-begge', navn:begge},
    {n:kunB.length, cls:'s-b', navn:kunB},
    {n:ingenNavn.length, cls:'s-ingen', navn:ingenNavn},
  ];
  const id = 'duell-'+Math.random().toString(36).slice(2,8);
  const bar = segs.map((s,i)=>
    `<div class="duell-seg ${s.cls} ${s.n?'':'tom'}" style="width:${pct(s.n)}%"
      onclick="visDuellNavn('${id}',${i})">${s.n||''}</div>`).join('');
  const navnBlokker = segs.map((s,i)=>
    `<div class="duell-names" id="${id}-${i}">${s.navn.map(n=>`<span class="nm-chip">${esc(n)}</span>`).join('')||'<span class="nm-chip">ingen</span>'}</div>`).join('');
  const begText = begge.length
    ? `<span class="duell-chip warn" onclick="visDuellNavn('${id}',1)">⚠ ${begge.length} har begge — mister garantert én</span>` : '';
  return `<div class="duell">
    <div class="duell-bar">${bar}</div>
    <div class="duell-legend">
      <span class="duell-chip" onclick="visDuellNavn('${id}',0)"><i style="background:var(--pitch)"></i>${esc(k.home)} videre: ${kunA.length+begge.length}</span>
      <span class="duell-chip" onclick="visDuellNavn('${id}',2)"><i style="background:#2b6cb0"></i>${esc(k.away)} videre: ${kunB.length+begge.length}</span>
      ${begText}
      <span class="duell-chip" onclick="visDuellNavn('${id}',3)"><i style="background:var(--slate)"></i>ingen av dem: ${ingenNavn.length}</span>
    </div>
    ${navnBlokker}
  </div>`;
}

function visDuellNavn(id, i){
  const el = document.getElementById(`${id}-${i}`);
  if(!el) return;
  const aapen = el.classList.contains('open');
  // lukk alle i samme duell
  for(let j=0;j<4;j++){ document.getElementById(`${id}-${j}`)?.classList.remove('open'); }
  if(!aapen) el.classList.add('open');
}

function visFane(navn){
  document.querySelectorAll('.fane').forEach(f=>f.classList.remove('aktiv'));
  document.getElementById('fane-'+navn)?.classList.add('aktiv');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('aktiv', b.dataset.fane===navn));
  try{ localStorage.setItem('fane', navn); }catch(e){}
}

function renderGrupper(d){
  const grupper = (d.fasit||{}).grupper||{};
  const keys = Object.keys(grupper).sort();
  if(!keys.length){ $("#grupper").innerHTML=''; return; }

  let html = '<h2>Grupper</h2><div class="grp-btns">';
  keys.forEach((g,i)=>{
    html += `<button class="grp-btn${i===0?' active':''}" onclick="showGroup('${g}',this)">${esc(g)}</button>`;
  });
  html += '</div>';

  keys.forEach((g,i)=>{
    const rows = grupper[g];
    html += `<div class="grp-content" id="grp-${g.replace(/ /g,'_')}" style="${i===0?'':'display:none'}">
      <table class="grp-table"><thead><tr>
        <th>#</th><th>Lag</th><th class="num">K</th><th class="num">P</th><th class="num">MF</th><th class="num">M+</th>
      </tr></thead><tbody>`;
    rows.forEach((r,j)=>{
      html += `<tr>
        <td class="num">${j+1}</td>
        <td><div class="team-cell">${flag(r.lag)} ${esc(r.lag)}</div></td>
        <td class="num">${r.spilt||0}</td>
        <td class="num">${r.poeng}</td>
        <td class="num">${r.mf>=0?'+':''}${r.mf}</td>
        <td class="num">${r.maal_for}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });
  $("#grupper").innerHTML = html;
}

function showGroup(g, btn){
  document.querySelectorAll('.grp-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.grp-content').forEach(el=>el.style.display='none');
  const el = document.getElementById('grp-'+g.replace(/ /g,'_'));
  if(el) el.style.display='';
}

function renderScorers(d){
  const scorers = (d.fasit||{}).topp_scorere||[];
  if(!scorers.length){ $("#scorers").innerHTML=''; return; }

  let html = `<div class="scorers-box"><h3>⚽ Toppscorere</h3>`;
  scorers.forEach((s,i)=>{
    html += `<div class="scorer-row${i===0?' lead':''}">
      <span class="rk">${i+1}</span>
      ${flag(s.lag)}
      <span><strong>${esc(s.navn)}</strong> <span class="team-name">${esc(s.lag)}</span></span>
      <span class="goals">${s.maal}</span>
    </div>`;
  });
  html += '</div>';
  $("#scorers").innerHTML = html;
}

function projCard(title, s, enhet){
  if(!s) return "";
  const lad = (arr,nr)=>(arr||[]).slice(0, nr?99:5).map((x,i)=>`<div><span>${nr?`${i+1}. `:''}${esc(x.navn)}</span><span>${x.tipp} <small style="color:var(--slate)">(±${x.diff})</small></span></div>`).join("");
  let inner;
  if(s.projeksjon!=null){
    inner = `<div class="bigrow">
        <div><div class="big">${s.fasit}</div><p class="muted">${enhet} så langt · ${s.spilt} av ${s.totalt} kamper</p></div>
        <div><div class="big">~${s.projeksjon}</div><p class="muted">projisert sluttsum</p></div>
      </div><div class="ladder">${lad(s.mot_projeksjon,true)}</div>`;
  } else {
    inner = `<div class="big">${s.fasit}</div>`;
    if(s.spilt!=null && s.totalt) inner += `<p class="muted">${enhet} så langt · ${s.spilt} av ${s.totalt} kamper</p>`;
    inner += `<div class="ladder">${lad(s.tipp)}</div>`;
  }
  return `<div class="card" style="grid-column:1/-1"><h3>${title}</h3>${inner}</div>`;
}

const KAT_COLS=[['hub','HUB'],['gruppevinner','Gr.vinner'],['r16','16-del'],['r8','8-del'],['kvart','Kvart'],['semi','Semi'],['bronse_lag','Bronse'],['bronse_vinner','Br.vinner'],['finale_lag','Finale'],['vm_vinner','VM'],['toppscorer','Toppsc.'],['assist','Assist'],['antall_maal','Mål'],['antall_kort','Kort']];

// Sluttspill-innhold (brakett + grupper) lagres her så fullskjerm gjenbruker det.
let _sluttspillBody = '';
// Kolonner i den speilede braketten (kampnr følger LATER-treet i bracket.py).
const BK_LEFT = [["16-delsfinale",[74,77,73,75,83,84,81,82]],["8-delsfinale",[89,90,93,94]],
                 ["Kvartfinale",[97,98]],["Semifinale",[101]]];
const BK_RIGHT = [["Semifinale",[102]],["Kvartfinale",[99,100]],
                  ["8-delsfinale",[91,92,95,96]],["16-delsfinale",[76,78,79,80,86,88,85,87]]];
// Hvilke kamper materer hver senere kamp (vinner av X / vinner av Y).
const BK_FEED = {89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[83,84],94:[81,82],
                 95:[86,88],96:[85,87],97:[89,90],98:[93,94],99:[91,92],100:[95,96],
                 101:[97,98],102:[99,100],104:[101,102]};

function renderSluttspill(d){
  const ss = d.projisert_sluttspill;
  if(!ss || !ss.runder){ $("#sluttspill").innerHTML=''; return; }
  const byNr = {}; ss.runder.forEach(r=>r.kamper.forEach(k=>byNr[k.nr]=k));
  const erR32 = nr => nr>=73 && nr<=88;

  const tip = (t)=>{
    if(!t) return `<span class="bk-team bk-tbd">?</span>`;
    if(t.placeholder) return `<span class="bk-team bk-tbd"><span class="bk-seed">${esc(t.seed)}</span> ${esc(t.navn)}</span>`;
    return `<span class="bk-team"><span class="bk-seed">${esc(t.seed)}</span>${flag(t.navn)}<span style="overflow:hidden;text-overflow:ellipsis">${esc(t.navn)}</span></span>`;
  };

  // Resultat-oppslag for spilte sluttspillkamper: lagpar -> {mål, straffer, vinner}
  const bkNorm = s => String(s||'').trim().toLowerCase();
  const bkPair = (x,y) => [bkNorm(x), bkNorm(y)].sort().join('|');
  const koScore = {};
  ((d.fasit||{}).kamper||[]).forEach(k=>{
    if(!k.stage || k.stage==='GROUP_STAGE' || k.status!=='FINISHED') return;
    if(k.home_score==null || k.away_score==null) return;
    const h = bkNorm(k.home), a = bkNorm(k.away);
    if(!h || !a) return;
    let vin = null;
    if(k.winner==='HOME_TEAM') vin = k.home;
    else if(k.winner==='AWAY_TEAM') vin = k.away;
    else if(k.home_score!==k.away_score) vin = k.home_score>k.away_score ? k.home : k.away;
    koScore[bkPair(k.home,k.away)] = {
      g: {[h]:k.home_score, [a]:k.away_score},
      p: (k.pen_home!=null && k.pen_away!=null) ? {[h]:k.pen_home, [a]:k.pen_away} : null,
      vinner: vin,
    };
  });
  const matchInfo = (a,b)=> (a&&b) ? koScore[bkPair(a,b)] : null;
  // Bygg en spilleside med ev. resultat (straffer i parentes) + uthevet vinner.
  const sideHtml = (t, info, fallbackCls)=>{
    if(!t || t.placeholder)
      return `<div class="bk-side ${fallbackCls}">${tip(t)}</div>`;
    let scoreHtml = '', winCls = '';
    if(info){
      const g = info.g[bkNorm(t.navn)];
      if(g!=null){
        const p = info.p && info.p[bkNorm(t.navn)];
        scoreHtml = `<span class="bk-score">${g}${p!=null?`<span class="bk-pen">(${p})</span>`:''}</span>`;
      }
      if(info.vinner && bkNorm(t.navn)===bkNorm(info.vinner)) winCls = ' bk-win';
    }
    return `<div class="bk-side ${fallbackCls}${winCls}">${tip(t)}${scoreHtml}</div>`;
  };

  const matchBox = (nr)=>{
    // 16-delsfinalen fylles ut (med grønn/rød). Innover vises faktiske lag når
    // matekampen er avgjort, ellers V/T-plassholder. Spilte kamper viser resultat.
    if(erR32(nr)){
      const k = byNr[nr]; if(!k) return '';
      const cls = t => (!t || t.placeholder) ? 'bk-side-tbd' : (t.sikker?'bk-sure':'bk-unsure');
      const info = matchInfo(k.home&&k.home.navn, k.away&&k.away.navn);
      return `<div class="bk-match">${sideHtml(k.home, info, cls(k.home))}${sideHtml(k.away, info, cls(k.away))}</div>`;
    }
    const feed = nr===103 ? [101,102] : BK_FEED[nr];
    const pre = nr===103 ? 'T' : 'V';
    const lagFor = (n)=>{ const fk = byNr[n]; return fk && (pre==='T' ? fk.taper : fk.vinner); };
    const t0 = lagFor(feed[0]), t1 = lagFor(feed[1]);
    const info = (t0&&t0.faktisk&&t1&&t1.faktisk) ? matchInfo(t0.navn, t1.navn) : null;
    const slot = (n, t)=>{
      if(t && t.faktisk) return sideHtml(t, info, 'bk-sure');
      return `<div class="bk-side bk-side-tbd"><span class="bk-team bk-tbd"><span class="bk-seed">${pre}${n}</span></span></div>`;
    };
    return `<div class="bk-match">${slot(feed[0], t0)}${slot(feed[1], t1)}</div>`;
  };
  const col = (navn,nrs)=>`<div class="bk-col"><div class="bk-round">${esc(navn)}</div><div class="bk-slots">${nrs.map(nr=>`<div class="bk-slot"><span class="bk-jl"></span>${matchBox(nr)}</div>`).join("")}</div></div>`;
  const left = BK_LEFT.map(c=>col(c[0],c[1])).join("");
  const right = BK_RIGHT.map(c=>col(c[0],c[1])).join("");
  const center = `<div class="bk-center">
    <div class="bk-round" style="color:var(--gold-deep)">Finale</div>${matchBox(104)}
    <div class="bk-round" style="margin-top:14px">Bronsefinale</div>${matchBox(103)}</div>`;

  // Gruppe-rutenett med grønn (ferdig) / rød (uferdig) ramme
  const gf = (d.fasit||{}).grupper_ferdig||{};
  const grupper = (d.fasit||{}).grupper||{};
  const grid = Object.keys(grupper).sort().map(g=>{
    const ferdig = gf[g];
    const trs = grupper[g].map((r,j)=>`<tr><td class="num">${j+1}</td>
      <td><div class="team-cell">${flag(r.lag)} ${esc(r.lag)}</div></td>
      <td class="num">${r.spilt||0}</td><td class="num">${r.poeng}</td>
      <td class="num">${r.mf>=0?'+':''}${r.mf}</td></tr>`).join("");
    return `<div class="grp-mini ${ferdig?'grp-ferdig':'grp-uferdig'}">
      <div class="grp-mini-h">${esc(g)}<span class="grp-mini-tag">${ferdig?'ferdig':'pågår'}</span></div>
      <table class="grp-table"><thead><tr><th>#</th><th>Lag</th><th class="num">K</th><th class="num">P</th><th class="num">MF</th></tr></thead><tbody>${trs}</tbody></table>
    </div>`;
  }).join("");

  const bracketHTML = `<div class="bk2"><div class="bk2-left">${left}</div>${center}<div class="bk2-right">${right}</div></div>`;

  // Sluttspill-tips mellom bracket og grupper
  const r16Html = buildSluttspillTipsHtml(d);

  _sluttspillBody = `${bracketHTML}
    ${r16Html}
    <h3 class="bk-sub">Grupper</h3>
    <p class="bk-note"><b style="color:var(--pitch)">Grønn ramme</b> = ferdigspilt gruppe, <b style="color:var(--red)">rød ramme</b> = pågår.</p>
    <div class="grp-grid">${grid}</div>`;
  $("#sluttspill").innerHTML = `<h2>Sluttspill-brakett</h2>
    <p class="bk-note">16-delsfinalen er fylt ut fra tabellene nå: <b style="color:var(--pitch)">grønn</b> = sikret plass (ferdig gruppe), <b style="color:var(--red)">rød</b> = avhenger av gjenstående kamper. Innover vises bare hvem som møtes (V = vinner av kampnr, T = taper), ikke en spådom.</p>
    <button class="old-toggle" onclick="toggleF(this,'bk-wrap')">Vis braketten ▾</button>
    <button class="old-toggle" onclick="openSS()" style="margin-left:8px">⛶ Fullskjerm</button>
    <div id="bk-wrap" style="display:none">${_sluttspillBody}</div>`;
}

function openSS(){
  $("#ss-fs-body").innerHTML = _sluttspillBody || '<p class="bk-note">Ingen brakett ennå.</p>';
  $("#ss-fs").style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeSS(){
  $("#ss-fs").style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{
  if(e.key==='Escape' && $("#ss-fs").style.display!=='none') closeSS();
});

function buildSluttspillTipsHtml(d){
  const runder = (d.statistikk||{}).sluttspill_tips;
  if(!runder || !runder.length) return '';
  // Nyeste/dypeste runde øverst (8-dels over 16-dels, osv.)
  return runder.slice().reverse().map(runde=>{
    const tips = runde.tips;
    if(!tips || !tips.length) return '';
    const bekreftet = tips[0].antall_bekreftet;
    const forventet = tips[0].forventet;
    const delvis = bekreftet < forventet;
    const cards = tips.map((t,i)=>{
      const pct = forventet ? Math.round(t.riktige/forventet*100) : 0;
      const gold = i===0 ? ' r16-gold' : '';
      const flags = (t.riktige_lag||[]).map(l=>
        `<span class="r16-flag" title="${esc(l)}">${flag(l)}</span>`).join('');
      return `<div class="r16-card${gold}">
        <div class="r16-pos">${i+1}.</div>
        <div class="r16-name">${esc(t.navn)}</div>
        <div class="r16-score">${t.riktige}</div>
        <div class="r16-of">av ${delvis?bekreftet+'/':''}${forventet}</div>
        <div class="r16-flags">${flags}</div>
        <div class="r16-bar"><div class="r16-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
    return `<h3 class="bk-sub">Riktige lag – ${esc(runde.label)}</h3>
      <p class="bk-note">${delvis?'Bekreftet '+bekreftet+' av '+forventet+' lag så langt. ':''}Hold over kortet for å se lagene.</p>
      <div class="r16-ranking">${cards}</div>`;
  }).join('');
}

// Stabil farge per deltakernavn (hash -> HSL)
function fargeFor(navn){ let h=0; for(const c of String(navn)) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h} 65% 45%)`; }

function renderPoenggraf(hist){
  const el=$("#poenggraf");
  if(!hist || hist.length<2){ el.innerHTML=''; return; }
  const siste=hist[hist.length-1].poeng;
  const navn=Object.keys(siste).sort((a,b)=>(siste[b]||0)-(siste[a]||0));
  const t0=new Date(hist[0].tid).getTime(), t1=new Date(hist[hist.length-1].tid).getTime();
  const span=Math.max(1,t1-t0);
  let maxP=1; hist.forEach(s=>Object.values(s.poeng).forEach(p=>{if(p>maxP)maxP=p;}));
  const W=720,H=340,mL=30,mR=10,mT=10,mB=20;
  const px=t=>mL+(new Date(t).getTime()-t0)/span*(W-mL-mR);
  const py=p=>mT+(1-p/maxP)*(H-mT-mB);
  const top3=new Set(navn.slice(0,3));
  let grid=''; const step=maxP<=10?2:maxP<=30?5:10;
  for(let v=0;v<=maxP;v+=step){ const y=py(v); grid+=`<line x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}" stroke="#eee"/><text x="${mL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#aaa">${v}</text>`; }
  const lines=navn.map(n=>{
    const pts=hist.map(s=>`${px(s.tid).toFixed(1)},${py(s.poeng[n]||0).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${fargeFor(n)}" stroke-width="${top3.has(n)?2.6:1.3}" stroke-linejoin="round" opacity="${top3.has(n)?1:.65}"/>`;
  }).join('');
  const legend=navn.map(n=>`<span class="lg"><i style="background:${fargeFor(n)}"></i>${esc(n)} <b>${siste[n]||0}</b></span>`).join('');
  el.innerHTML=`<h2>Poengutvikling</h2>
    <p class="bk-note">Poeng gjennom mesterskapet. Topp 3 er uthevet.</p>
    <button class="old-toggle" onclick="toggleF(this,'pg-wrap')">Vis graf ▾</button>
    <div id="pg-wrap" style="display:none"><svg viewBox="0 0 ${W} ${H}" class="pg-svg">${grid}${lines}</svg>
    <div class="pg-legend">${legend}</div></div>`;
}

function renderHeatmap(d){
  const el=$("#heatmap"); const tf=(d.statistikk||{}).tippefordeling;
  if(!tf||!tf.dager){ el.innerHTML=''; return; }
  const kamper=[]; tf.dager.forEach(dag=>dag.kamper.forEach(k=>{ if(k.fasit) kamper.push(k); }));
  if(!kamper.length){ el.innerHTML=''; return; }
  const navn=(d.stilling||[]).map(s=>s.navn);
  const pickOf=(k,n)=>{ for(const u of ['H','U','B']) if((k.navn[u]||[]).includes(n)) return u; return null; };
  const score=n=>{ let t=0,tot=0; kamper.forEach(k=>{const p=pickOf(k,n); if(p){tot++; if(p===k.fasit)t++;}}); return tot?t/tot:-1; };
  const sorted=[...navn].sort((a,b)=>score(b)-score(a));
  const head=`<div class="hm-row hm-head"><span class="hm-name"></span>${kamper.map((k,i)=>`<span class="hm-cell hm-h" title="${esc(k.home)}–${esc(k.away)}">${i+1}</span>`).join('')}</div>`;
  const body=sorted.map(n=>{
    let t=0,tot=0;
    const cells=kamper.map(k=>{const p=pickOf(k,n); let cls='miss',tt='ikke tippet'; if(p){tot++; if(p===k.fasit){cls='hit';t++;tt='traff';}else{cls='wrong';tt='bom';}} return `<span class="hm-cell ${cls}" title="${esc(k.home)}–${esc(k.away)}: ${tt}"></span>`;}).join('');
    return `<div class="hm-row"><span class="hm-name">${esc(n)} <b>${tot?Math.round(t/tot*100):0}%</b></span>${cells}</div>`;
  }).join('');
  el.innerHTML=`<h2>Treff-heatmap</h2>
    <p class="bk-note">Hver rute = en ferdigspilt kamp. Grønn = traff utfallet · rød = bom · grå = ikke tippet. Sortert etter treffprosent.</p>
    <button class="old-toggle" onclick="toggleF(this,'hm-wrap')">Vis heatmap ▾</button>
    <div id="hm-wrap" style="display:none"><div class="hm-scroll">${head}${body}</div></div>`;
}

function renderLikhet(d){
  const el=$("#likhet"); const tf=(d.statistikk||{}).tippefordeling;
  if(!tf||!tf.dager){ el.innerHTML=''; return; }
  const navn=(d.stilling||[]).map(s=>s.navn);
  const picks={}; navn.forEach(n=>picks[n]={});
  tf.dager.forEach(dag=>dag.kamper.forEach(k=>{ const key=k.home+'|'+k.away; ['H','U','B'].forEach(u=>(k.navn[u]||[]).forEach(n=>{ if(picks[n]) picks[n][key]=u; })); }));
  const sim=(a,b)=>{ let same=0,tot=0; for(const key in picks[a]) if(key in picks[b]){ tot++; if(picks[a][key]===picks[b][key]) same++; } return tot?same/tot:null; };
  let best=null,worst=null;
  for(let i=0;i<navn.length;i++)for(let j=i+1;j<navn.length;j++){ const s=sim(navn[i],navn[j]); if(s==null)continue; if(!best||s>best.s)best={a:navn[i],b:navn[j],s}; if(!worst||s<worst.s)worst={a:navn[i],b:navn[j],s}; }
  if(!best){ el.innerHTML=''; return; }
  const head=`<tr><th></th>${navn.map(n=>`<th title="${esc(n)}">${esc(n.slice(0,3))}</th>`).join('')}</tr>`;
  const rows=navn.map(a=>`<tr><th title="${esc(a)}">${esc(a.slice(0,6))}</th>${navn.map(b=>{ if(a===b)return '<td class="lk-self"></td>'; const s=sim(a,b); if(s==null)return '<td></td>'; const pct=Math.round(s*100); return `<td style="background:hsl(${Math.round(s*120)} 60% ${(90-s*35).toFixed(0)}%)" title="${esc(a)} vs ${esc(b)}: ${pct}%">${pct}</td>`;}).join('')}</tr>`).join('');
  el.innerHTML=`<h2>Hvor enige er vi?</h2>
    <p class="bk-note">Andel kamper to deltakere tippet samme utfall. Grønnere = likere.</p>
    <p class="bk-note">Mest like: <b>${esc(best.a)} & ${esc(best.b)}</b> (${Math.round(best.s*100)}%) · Mest ulike: <b>${esc(worst.a)} & ${esc(worst.b)}</b> (${Math.round(worst.s*100)}%)</p>
    <button class="old-toggle" onclick="toggleF(this,'lk-wrap')">Vis matrise ▾</button>
    <div id="lk-wrap" style="display:none"><div class="lk-scroll"><table class="lk-tab">${head}${rows}</table></div></div>`;
}

function renderBonus(d){
  const el=$("#bonus"); const bt=(d.statistikk||{}).bonustips;
  if(!bt||!bt.length){ el.innerHTML=''; return; }
  const fact=d.fasit||{}; const norm=s=>String(s||'').trim().toLowerCase();
  const r16=new Set((fact.r16||[]).map(norm)); const grpPos={}; const ferdig=fact.gruppespill_ferdig;
  Object.values(fact.grupper||{}).forEach(rows=>rows.forEach((r,i)=>{grpPos[norm(r.lag)]=i;}));
  const lagStatus=lag=>{ if(!lag)return{dot:'⚪'}; const n=norm(lag);
    if(ferdig) return r16.has(n)?{dot:'🟢'}:{dot:'🔴'};
    const pos=grpPos[n]; if(pos==null)return{dot:'⚪'};
    return pos<=1?{dot:'🟢'}:pos===2?{dot:'🟡'}:{dot:'🔴'}; };
  const scorers=fact.topp_scorere||[]; const led=scorers.length?scorers[0].maal:0;
  const scStatus=nv=>{ if(!nv)return{dot:'⚪'}; const h=scorers.find(s=>norm(s.navn).includes(norm(nv))||norm(nv).includes(norm(s.navn))); return h?{dot:h.maal===led?'🟢':'🟡'}:{dot:'🔴'}; };
  const tell=felt=>{ const m={}; bt.forEach(b=>{const v=(b[felt]||'').trim(); if(v)m[v]=(m[v]||0)+1;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const pop=arr=>arr.slice(0,3).map(([k,v])=>`${esc(k)} (${v})`).join(' · ')||'–';
  const mester=bt.map(b=>`<div class="bn-row"><span>${esc(b.navn)}</span><span>${lagStatus(b.mester).dot} ${esc(b.mester||'–')}</span></div>`).join('');
  const sc=bt.map(b=>`<div class="bn-row"><span>${esc(b.navn)}</span><span>${scStatus(b.toppscorer).dot} ${esc(b.toppscorer||'–')}</span></div>`).join('');
  const maal=[...bt].sort((a,b)=>(a.antall_maal??1e9)-(b.antall_maal??1e9)).map(b=>`<div class="bn-row"><span>${esc(b.navn)}</span><span>${b.antall_maal??'–'}</span></div>`).join('');
  const kort=[...bt].sort((a,b)=>(a.antall_kort??1e9)-(b.antall_kort??1e9)).map(b=>`<div class="bn-row"><span>${esc(b.navn)}</span><span>${b.antall_kort??'–'}</span></div>`).join('');
  el.innerHTML=`<h2>Bonus-tips</h2>
    <p class="bk-note">🟢 fortsatt med · 🟡 vipper / nær · 🔴 ute. Hvem satset på hva.</p>
    <button class="old-toggle" onclick="toggleF(this,'bn-wrap')">Vis bonus-tips ▾</button>
    <div id="bn-wrap" style="display:none"><div class="cards">
      <div class="card"><h3>Mester 🏆</h3><p class="muted">Populært: ${pop(tell('mester'))}</p><div class="bn-list">${mester}</div></div>
      <div class="card"><h3>Toppscorer ⚽</h3><p class="muted">Populært: ${pop(tell('toppscorer'))}</p><div class="bn-list">${sc}</div></div>
      <div class="card"><h3>Antall mål 🥅</h3><p class="muted">Fasit så langt: ${(d.statistikk.antall_maal||{}).fasit??'–'}</p><div class="bn-list">${maal}</div></div>
      <div class="card"><h3>Antall kort 🟨</h3><p class="muted">Fasit så langt: ${(d.statistikk.antall_kort||{}).fasit??'–'}</p><div class="bn-list">${kort}</div></div>
    </div></div>`;
}

const PICK_LBL = {H:'Hjemme', U:'Uavgjort', B:'Borte'};

function renderFordeling(d){
  const tf = (d.statistikk||{}).tippefordeling;
  if(!tf || !tf.dager || !tf.dager.length){ $("#fordeling").innerHTML=''; return; }
  const N = tf.antall_deltakere || 1;
  const dateLabel = dato => {
    const x = new Date(dato+'T12:00:00');
    const days=['søn','man','tir','ons','tor','fre','lør'];
    return `${days[x.getDay()]} ${x.getDate()}.${x.getMonth()+1}`;
  };

  // Flat liste over alle kamper for innsikter
  const alle = [];
  tf.dager.forEach(dag => dag.kamper.forEach(k => alle.push(k)));

  // --- Innsikter ---
  const pct = (k,p) => Math.round(100*k[p]/N);
  const maxPick = k => ['H','U','B'].reduce((a,b)=> k[b]>k[a]?b:a, 'H');
  const enig = [...alle].sort((a,b)=> pct(b,maxPick(b)) - pct(a,maxPick(a)))[0];
  const splittet = [...alle].sort((a,b)=> pct(a,maxPick(a)) - pct(b,maxPick(b)))[0];
  const ferdige = alle.filter(k=> k.fasit);
  const folketRiktig = ferdige.filter(k=> maxPick(k)===k.fasit).length;
  const overrasket = ferdige.filter(k=> maxPick(k)!==k.fasit)
    .sort((a,b)=> pct(b,maxPick(b)) - pct(a,maxPick(a)))[0];

  // Bare de mest relevante innsiktene, kort oppsummert
  const navnK = k => `${esc(k.home)}–${esc(k.away)}`;
  const chips = [];
  if(enig) chips.push(`<span class="fchip"><b>Mest enige:</b> ${navnK(enig)} (${pct(enig,maxPick(enig))}% ${PICK_LBL[maxPick(enig)].toLowerCase()})</span>`);
  if(splittet) chips.push(`<span class="fchip"><b>Mest splittet:</b> ${navnK(splittet)}</span>`);
  if(ferdige.length) chips.push(`<span class="fchip"><b>Folkets favoritt:</b> ${folketRiktig}/${ferdige.length} rett</span>`);
  if(overrasket) chips.push(`<span class="fchip"><b>Bombe:</b> ${navnK(overrasket)} ble ${PICK_LBL[overrasket.fasit].toLowerCase()}</span>`);
  const ins = `<div class="fchips">${chips.join('')}</div>`;

  const legend = `<div class="flegend">
    <span><span class="sw" style="background:#3F6CB5"></span><b>H</b> Hjemme</span>
    <span><span class="sw" style="background:#E08A2B"></span><b>U</b> Uavgjort</span>
    <span><span class="sw" style="background:#7C8696"></span><b>B</b> Borte</span>
    <span style="margin-left:auto">Gulkant = riktig utfall</span>
  </div>`;

  const seg = (k,p) => {
    const n = k[p], w = 100*n/N;
    if(!n) return '';
    const win = k.fasit===p ? ' win' : '';
    return `<div class="fseg ${p.toLowerCase()}${win}" style="width:${w}%" title="${PICK_LBL[p]}: ${n} av ${N}"><span>${p} ${Math.round(w)}%</span></div>`;
  };
  const matchHtml = k => {
    const navn = k.navn || {H:[],U:[],B:[]};
    let check = '';
    if(k.fasit){
      // Ferdigspilt: vis hvem som tok riktig
      const riktig = navn[k.fasit] || [];
      check = riktig.length
        ? `<div class="fcheck hit">✓ Riktig (${PICK_LBL[k.fasit].toLowerCase()}): ${riktig.map(esc).join(', ')}</div>`
        : `<div class="fcheck miss">✗ Ingen tippet riktig · fasit: ${PICK_LBL[k.fasit]}</div>`;
    } else {
      // Ikke spilt: vis hvem som har tippet hva
      const linje = p => (navn[p]||[]).length
        ? `<span class="ftip"><b>${p}</b> ${(navn[p]).map(esc).join(', ')}</span>` : '';
      const deler = ['H','U','B'].map(linje).filter(Boolean).join('');
      if(deler) check = `<div class="fpicks">${deler}</div>`;
    }
    return `<div class="fmatch">
      <div class="fhead">${flag(k.home)} ${esc(k.home)} <span class="vs">–</span> ${esc(k.away)} ${flag(k.away)}
        ${k.group?`<span class="grp">Gr. ${esc(k.group)}</span>`:''}</div>
      <div class="fbar">${seg(k,'H')}${seg(k,'U')}${seg(k,'B')}</div>
      ${check}</div>`;
  };
  const dayHtml = (dag,label) => `<div class="fday"><h3>${label||dateLabel(dag.dato)}</h3>${dag.kamper.map(matchHtml).join('')}</div>`;

  // Del opp i tidligere / i dag / kommende
  const today = new Date().toISOString().slice(0,10);
  const past = tf.dager.filter(x=> x.dato < today);
  const todayDag = tf.dager.find(x=> x.dato === today);
  const future = tf.dager.filter(x=> x.dato > today);

  let synlig = '';
  if(todayDag){ synlig = dayHtml(todayDag, 'I dag'); }
  else if(future.length){ synlig = dayHtml(future[0], 'Neste: '+dateLabel(future[0].dato)); }
  else if(past.length){ synlig = dayHtml(past[past.length-1]); }

  const restFuture = todayDag ? future : future.slice(1);
  const futureCount = restFuture.reduce((a,x)=>a+x.kamper.length,0);
  const pastCount = past.reduce((a,x)=>a+x.kamper.length,0);

  let toggles = '';
  if(restFuture.length){
    toggles += `<button class="old-toggle" onclick="toggleF(this,'f-future')">Vis kommende kamper (${futureCount}) ▾</button>
      <div id="f-future" style="display:none">${restFuture.map(x=>dayHtml(x)).join('')}</div>`;
  }
  if(past.length){
    toggles += `<button class="old-toggle" onclick="toggleF(this,'f-past')">Vis tidligere kamper (${pastCount}) ▾</button>
      <div id="f-past" style="display:none">${[...past].reverse().map(x=>dayHtml(x)).join('')}</div>`;
  }

  $("#fordeling").innerHTML = `<h2>Tippefordeling</h2>${ins}${legend}${synlig}${toggles}`;
}

function toggleF(btn, id){
  const el = document.getElementById(id);
  const open = el.style.display==='none';
  el.style.display = open ? '' : 'none';
  btn.textContent = btn.textContent.replace(open?'Vis':'Skjul', open?'Skjul':'Vis').replace(open?'▾':'▴', open?'▴':'▾');
}

let _podId = null;

async function renderPodcast(id, d){
  _podId = id;
  let pod=null;
  try{ pod = await jget(`${id}/podcast/siste.json`); }catch(e){}
  if(!pod){ $("#podcast").innerHTML=""; return; }

  let episoder=[];
  try{ episoder = await jget(`${id}/podcast/episoder.json`); }catch(e){}

  let manus=null;
  try{ manus = await jget(`${id}/podcast/manus-${pod.id}.json`); }catch(e){}

  let oppsummeringHtml = '';
  if(pod.oppsummering){
    oppsummeringHtml = `<div class="oppsummering">
      <div class="opp-head"><h4>📋 Oppsummering</h4>
        <button class="kopier-btn" onclick="kopierOppsummering(this)">Kopier</button></div>
      <p class="opp-tekst" id="opp-tekst">${esc(pod.oppsummering)}</p>
    </div>`;
  }

  let manusHtml = '';
  if(manus && manus.length){
    manusHtml = `<button class="manus-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent=this.nextElementSibling.classList.contains('open')?'Skjul manus':'Les manus'">Les manus</button>
    <div class="manus-box" id="manus-box">${manus.map(m=>`<div class="replikk"><span class="vert-navn">${esc(m.vert)}:</span>${esc(m.tekst)}</div>`).join('')}</div>`;
  }

  let playlistHtml = '';
  if(episoder.length > 0){
    playlistHtml = `<div class="playlist"><h4>Alle episoder</h4>`;
    episoder.forEach((ep,i)=>{
      const dato = new Date(ep.dato).toLocaleDateString('no-NO',{day:'numeric',month:'short'});
      const isActive = ep.id === pod.id;
      playlistHtml += `<div class="pl-item${isActive?' active':''}" onclick="playEpisode('${esc(ep.id)}','${esc(ep.lyd||'')}','${esc(ep.tittel||'')}')">
        <span class="pl-play">${isActive?'▶':'▷'}</span>
        <span class="pl-date">${dato}</span>
        <span>${esc(ep.tittel||ep.id)}</span>
      </div>`;
    });
    playlistHtml += '</div>';
  }

  $("#podcast").innerHTML = `<div class="pod"><h3 id="pod-title">🎙️ ${esc(pod.tittel||'Dagens sending')}</h3>
    <audio id="pod-audio" controls ${pod.lyd?`src="${id}/podcast/${esc(pod.lyd)}"`:''} style="width:100%;margin-top:6px"></audio>
    <p style="margin:8px 0 0;font-size:13px;color:#D8E8DC" id="pod-ingress">${esc(pod.ingress||'')}
    ${pod.feed?` · <a style="color:var(--gold)" href="${id}/feed.xml">RSS-feed</a>`:''}</p>
    ${oppsummeringHtml}
    ${manusHtml}
    ${playlistHtml}</div>`;
}

function kopierOppsummering(btn){
  const t = document.getElementById('opp-tekst');
  if(!t) return;
  navigator.clipboard.writeText(t.textContent).then(()=>{
    const o = btn.textContent; btn.textContent = 'Kopiert!';
    setTimeout(()=>{ btn.textContent = o; }, 1500);
  }).catch(()=>{});
}

async function playEpisode(epId, lyd, tittel){
  const audio = document.getElementById('pod-audio');
  if(lyd && audio){
    audio.src = `${_podId}/podcast/${lyd}`;
    audio.play();
  }
  document.getElementById('pod-title').textContent = '🎙️ ' + (tittel||epId);
  document.querySelectorAll('.pl-item').forEach(el=>{
    el.classList.remove('active');
    el.querySelector('.pl-play').textContent = '▷';
  });
  event.currentTarget.classList.add('active');
  event.currentTarget.querySelector('.pl-play').textContent = '▶';

  // Last manus for valgt episode
  const box = document.getElementById('manus-box');
  if(box){
    try{
      const m = await jget(`${_podId}/podcast/manus-${epId}.json`);
      box.innerHTML = m.map(r=>`<div class="replikk"><span class="vert-navn">${esc(r.vert)}:</span>${esc(r.tekst)}</div>`).join('');
    }catch(e){ box.innerHTML = '<div class="replikk" style="color:rgba(255,255,255,.4)">Manus ikke tilgjengelig</div>'; }
  }

  // Oppdater oppsummering for valgt episode
  const opp = document.getElementById('opp-tekst');
  if(opp){
    try{
      const o = await jget(`${_podId}/podcast/oppsummering-${epId}.json`);
      opp.textContent = o.tekst || 'Ingen oppsummering for denne episoden.';
    }catch(e){ opp.textContent = 'Ingen oppsummering for denne episoden.'; }
  }
}
