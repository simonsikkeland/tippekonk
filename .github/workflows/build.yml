name: Bygg stilling og publiser

# Kjører når du laster opp/endrer ark, og automatisk under mesterskap.
on:
  push:
    paths:
      - "tournaments/**/ark/**"
      - "tournaments/**/tournament.json"
      - "tournaments/**/data/manuell.json"
      - "scripts/**"
      - "site/**"
  workflow_dispatch: {}        # lar deg kjøre manuelt fra GitHub
  schedule:
    - cron: "10 */3 * * *"     # hver 3. time: hent resultater + bygg side
    - cron: "30 6 * * *"       # 1x/dag (08:30 norsk): + podcast (Claude + ElevenLabs)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: |
          pip install openpyxl
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Hent resultater og bygg stilling for alle turneringer
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.DATAAPI }}
        run: |
          for t in tournaments/*/; do
            if [ -f "$t/tournament.json" ]; then
              echo "== $t =="
              python scripts/fetch_results.py "$t" || true
              python scripts/build_standings.py "$t" || true
            fi
          done

      # Podcast (Claude-tekst + ElevenLabs) kun 1x/dag: den daglige cron-en eller
      # manuell kjøring. De 3-timers kjøringene hopper over dette steget.
      - name: Generer podcast (manus + lyd)
        if: >-
          env.ANTHROPIC_API_KEY != '' &&
          (github.event_name != 'schedule' || github.event.schedule == '30 6 * * *')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTAPI }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENAPI }}
        run: |
          python scripts/generate_podcast.py tournaments/vm-2026 --lyd || true

      - name: Bygg nettsiden
        run: python scripts/build_site.py

      - name: Commit oppdaterte data
        run: |
          git config user.name "vm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "Auto: oppdatert stilling $(date -u +%FT%TZ)" || echo "ingen endringer"
          git pull --rebase -X theirs || true
          git push || echo "ingen push"

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
