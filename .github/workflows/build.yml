name: Bygg stilling og publiser

# Kjører når du laster opp/endrer ark, og automatisk under mesterskap.
on:
  push:
    paths:
      - "tournaments/**/ark/**"
      - "tournaments/**/tournament.json"
      - "tournaments/**/data/manuell.json"
      - "scripts/**"
      - "site/**"
  workflow_dispatch:           # lar deg kjøre manuelt fra GitHub
    inputs:
      force_podcast:
        description: "Regenerer dagens podcast selv om den allerede finnes"
        type: boolean
        default: false
  schedule:
    - cron: "*/30 * * * *"     # hver 30. min: hent resultater + bygg side

permissions:
  contents: write
  pages: write
  id-token: write

# Kjør aldri to bygg samtidig. Overlappende push- og cron-kjøringer kunne
# tidligere skrive over hverandre midt i en oppdatering og gi ustabil stilling.
# cancel-in-progress: false -> la pågående kjøring fullføre, køylegg den nye.
concurrency:
  group: bygg-stilling
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: |
          pip install openpyxl
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Hent resultater og bygg stilling for alle turneringer
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.DATAAPI }}
        run: |
          for t in tournaments/*/; do
            if [ -f "$t/tournament.json" ]; then
              echo "== $t =="
              python scripts/fetch_results.py "$t" || true
              python scripts/build_standings.py "$t" || true
            fi
          done

      # Podcast (Claude-tekst + ElevenLabs) kjøres KUN manuelt (workflow_dispatch).
      # De planlagte kjøringene henter bare resultater og bygger siden.
      - name: Generer podcast (manus + lyd)
        if: env.ANTHROPIC_API_KEY != '' && github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTAPI }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENAPI }}
          FORCE_PODCAST: ${{ inputs.force_podcast && '1' || '' }}
        run: |
          python scripts/generate_podcast.py tournaments/vm-2026 --lyd || true

      - name: Bygg nettsiden
        run: python scripts/build_site.py

      - name: Commit oppdaterte data
        run: |
          git config user.name "vm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "Auto: oppdatert stilling $(date -u +%FT%TZ)" || { echo "ingen endringer"; exit 0; }
          # Robust push med retry. Fasit er nå monoton, så et tapt kappløp
          # repareres uansett av neste kjøring.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash && git push; then
              echo "pushet (forsøk $i)"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push forsøk $i feilet, prøver igjen om 5s..."
            sleep 5
          done
          echo "kunne ikke pushe etter 5 forsøk"; exit 1

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
